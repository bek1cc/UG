<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>UG Tablet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a2e; 
            color: white; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        h1 { color: #00d4ff; margin-bottom: 10px; }
        p { color: #888; }
        .login-form { margin-top: 20px; }
        input { 
            padding: 10px; 
            margin: 5px; 
            border: 1px solid #333; 
            background: #16213e; 
            color: white; 
            border-radius: 5px; 
            width: 80%; 
        }
        button { 
            padding: 10px 30px; 
            margin-top: 10px; 
            background: #00d4ff; 
            border: none; 
            color: #000; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>UNICATE GAMING</h1>
        <p>Tablet v1.0</p>
        <div class="login-form">
            <input type="password" id="pin" placeholder="Unesi PIN...">
            <br>
            <button onclick="attemptLogin()">PRIJAVI SE</button>
        </div>
    </div>
    <script src="cef.js"></script>
    <script>
        function attemptLogin() {
            var pin = document.getElementById('pin').value;
            if (cef) cef.emit('tablet:login:attempt', pin);
        }
    </script>
</body>
</html>
