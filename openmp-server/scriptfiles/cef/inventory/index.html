<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>UG Inventory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: rgba(0,0,0,0.85); 
            color: white; 
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        h2 { color: #00d4ff; margin-bottom: 15px; text-align: center; }
        .items { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .item { 
            background: #1a1a2e; 
            border: 1px solid #333; 
            border-radius: 5px; 
            padding: 10px; 
            text-align: center; 
            cursor: pointer; 
        }
        .item:hover { border-color: #00d4ff; }
        .item-name { font-size: 11px; margin-top: 5px; }
        .close-btn { 
            position: absolute; top: 10px; right: 10px; 
            background: #ff4444; border: none; color: white; 
            padding: 5px 15px; cursor: pointer; border-radius: 3px; 
        }
    </style>
</head>
<body>
    <button class="close-btn" onclick="closeInv()">X</button>
    <h2>INVENTAR</h2>
    <div class="items" id="itemList">
        <p style="color:#888">Ucitavanje...</p>
    </div>
    <script src="cef.js"></script>
    <script>
        function closeInv() {
            if (cef) cef.emit('inventory:close');
        }
    </script>
</body>
</html>
