<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>UG Laptop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a1a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .laptop { 
            background: #16213e; 
            border-radius: 10px; 
            padding: 30px; 
            width: 90%; 
            max-width: 700px; 
        }
        h1 { color: #00d4ff; margin-bottom: 15px; }
        .menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .menu-item { 
            background: #1a1a2e; border: 1px solid #333; border-radius: 8px; 
            padding: 15px; text-align: center; cursor: pointer;
        }
        .menu-item:hover { border-color: #00d4ff; }
        .close-btn { 
            position: absolute; top: 10px; right: 10px; 
            background: #ff4444; border: none; color: white; 
            padding: 5px 15px; cursor: pointer; border-radius: 3px; 
        }
    </style>
</head>
<body>
    <div class="laptop">
        <h1>UNICATE LAPTOP</h1>
        <div class="menu">
            <div class="menu-item" onclick="notify('Banka - uskoro!')">BANKA</div>
            <div class="menu-item" onclick="notify('DarkWeb - uskoro!')">DARK WEB</div>
            <div class="menu-item" onclick="notify('Email - uskoro!')">EMAIL</div>
        </div>
    </div>
    <script src="cef.js"></script>
    <script>
        function notify(msg) { if(cef) cef.emit('laptop:notify', msg); }
    </script>
</body>
</html>
