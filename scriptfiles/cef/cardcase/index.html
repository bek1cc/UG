<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG Card Case</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090d;--surface:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.06);
  --text:#e8e8e8;--text-dim:rgba(255,255,255,0.35);--text-muted:rgba(255,255,255,0.15);
  --accent-gold:#c9a84c;--accent-gold-dim:rgba(201,168,76,0.15);
  --common:#8b919a;--rare:#4a8fe7;--epic:#9b6dff;--legendary:#e8b739;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;
  overflow:hidden;width:100vw;height:100vh;user-select:none;-webkit-font-smoothing:antialiased}

/* ===== CANVASES ===== */
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
canvas#fx{position:fixed;inset:0;z-index:100;pointer-events:none}

/* ===== ATMOSPHERE ===== */
.atmos{position:fixed;inset:0;z-index:1;pointer-events:none}
.atmos::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% 40%,rgba(201,168,76,0.03) 0%,transparent 60%)}
.atmos::after{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 100%,rgba(201,168,76,0.02) 0%,transparent 40%)}

.noise{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* ===== SCREEN FLASH ===== */
.screen-flash{position:fixed;inset:0;z-index:99;pointer-events:none;opacity:0;transition:opacity 0.08s}
.screen-flash.fire{opacity:1}

/* ===== MAIN LAYOUT ===== */
#app{position:relative;z-index:5;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ===== HEADER ===== */
.hdr{position:absolute;top:0;left:0;right:0;padding:28px 40px;display:flex;align-items:center;justify-content:space-between;z-index:20;
  opacity:0;animation:fadeSlideDown 0.6s 0.2s ease forwards}
.hdr-brand{display:flex;align-items:center;gap:14px}
.hdr-brand .mark{width:32px;height:32px;border:1px solid rgba(201,168,76,0.4);border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:11px;color:var(--accent-gold);letter-spacing:1px}
.hdr-brand .name{font-size:13px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.5)}
.hdr-price{font-size:12px;font-weight:500;letter-spacing:2px;color:var(--text-dim);
  padding:6px 16px;border:1px solid var(--border);border-radius:20px}
.hdr-price span{color:var(--accent-gold);font-weight:700}

@keyframes fadeSlideDown{to{opacity:1;transform:translateY(0)}}

/* ===== INSTRUCTION ===== */
.instruction{position:absolute;bottom:36px;left:0;right:0;text-align:center;z-index:20;
  font-size:11px;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);
  opacity:0;animation:fadeIn 0.6s 1.8s forwards;transition:opacity 0.4s}
.instruction.hidden{opacity:0!important}
.instruction .line{display:inline-block;width:24px;height:1px;background:var(--text-muted);vertical-align:middle;margin:0 12px}

/* ===== CARD FIELD ===== */
.field{position:relative;display:flex;align-items:center;justify-content:center;gap:20px}

/* ===== CARD ===== */
.card{width:160px;height:224px;position:relative;cursor:pointer;
  transition:transform 0.5s cubic-bezier(0.16,1,0.3,1),opacity 0.4s;
  opacity:0;transform:translateY(60px) scale(0.9)}
.card.entered{opacity:1;transform:translateY(0) scale(1)}
.card:hover{transform:translateY(-12px) scale(1.03)}
.card.picked{transform:translateY(-30px) scale(1.08)!important;z-index:50!important}
.card.dimmed{opacity:0.15!important;transform:scale(0.88)!important;pointer-events:none;filter:blur(1px)}

.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.7s cubic-bezier(0.4,0,0.2,1)}
.card.flipped .card-inner{transform:rotateY(180deg)}

.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;overflow:hidden}

/* ===== CARD BACK ===== */
.card-back{
  background:linear-gradient(145deg,#111318,#0d0f14);
  border:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;flex-direction:column}
.card-back::before{content:'';position:absolute;inset:6px;border:1px solid rgba(255,255,255,0.03);border-radius:7px}
.card-back::after{content:'';position:absolute;inset:14px;border:1px solid rgba(255,255,255,0.015);border-radius:5px}

.card-back .emblem{width:48px;height:48px;border:1px solid rgba(201,168,76,0.2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.card-back .emblem span{font-size:18px;color:rgba(201,168,76,0.4);font-weight:300}
.card-back .card-id{font-size:9px;font-weight:500;letter-spacing:3px;color:rgba(255,255,255,0.12);text-transform:uppercase}

/* Holographic shimmer on back */
.card-back .shimmer{position:absolute;inset:0;background:linear-gradient(
  105deg,transparent 30%,rgba(201,168,76,0.03) 45%,rgba(201,168,76,0.06) 50%,rgba(201,168,76,0.03) 55%,transparent 70%);
  background-size:200% 100%;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}

/* ===== CARD FRONT ===== */
.card-front{
  transform:rotateY(180deg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;text-align:center;gap:4px}

.card-front .rarity-bar{position:absolute;top:0;left:0;right:0;height:2px;border-radius:10px 10px 0 0}
.card-front .reward-type{font-size:8px;font-weight:600;letter-spacing:3px;text-transform:uppercase;opacity:0.5;margin-top:8px}
.card-front .reward-name{font-size:16px;font-weight:800;letter-spacing:1px;line-height:1.2}
.card-front .reward-sub{font-size:10px;font-weight:400;letter-spacing:1px;opacity:0.4}
.card-front .divider{width:32px;height:1px;opacity:0.15;margin:6px 0}
.card-front .reward-val{font-size:22px;font-weight:900;letter-spacing:1px}

/* Vehicle specific */
.card-front .vehicle-stats{display:flex;gap:8px;width:100%;margin-top:6px}
.card-front .vstat{flex:1;text-align:center}
.card-front .vstat .vlabel{font-size:7px;font-weight:500;letter-spacing:2px;text-transform:uppercase;opacity:0.3}
.card-front .vstat .vbar{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;margin:3px 0;overflow:hidden}
.card-front .vstat .vfill{height:100%;border-radius:1px;width:0;transition:width 0.8s 0.3s ease-out}
.card-front .vstat .vval{font-size:10px;font-weight:700}

/* ===== RARITY STYLES ===== */
/* Common */
.r-common .card-front{background:linear-gradient(160deg,#1a1c22,#13151a);border:1px solid rgba(139,145,154,0.15)}
.r-common .rarity-bar{background:var(--common)}
.r-common .reward-name{color:var(--common)}
.r-common .reward-val{color:var(--common)}
.r-common .vfill{background:var(--common)!important}
.r-common .divider{background:var(--common)}

/* Rare */
.r-rare .card-front{background:linear-gradient(160deg,#0f1628,#0c1220);border:1px solid rgba(74,143,231,0.2)}
.r-rare .rarity-bar{background:var(--rare)}
.r-rare .reward-name{color:var(--rare)}
.r-rare .reward-val{color:var(--rare)}
.r-rare .vfill{background:var(--rare)!important}
.r-rare .divider{background:var(--rare)}

/* Epic */
.r-epic .card-front{background:linear-gradient(160deg,#170f28,#120c20);border:1px solid rgba(155,109,255,0.25)}
.r-epic .rarity-bar{background:var(--epic)}
.r-epic .reward-name{color:var(--epic)}
.r-epic .reward-val{color:var(--epic)}
.r-epic .vfill{background:var(--epic)!important}
.r-epic .divider{background:var(--epic)}

/* Legendary */
.r-legendary .card-front{background:linear-gradient(160deg,#1a1508,#14100a);border:1px solid rgba(232,183,57,0.3)}
.r-legendary .rarity-bar{background:var(--legendary)}
.r-legendary .reward-name{color:var(--legendary)}
.r-legendary .reward-val{color:var(--legendary);text-shadow:0 0 20px rgba(232,183,57,0.4)}
.r-legendary .vfill{background:var(--legendary)!important}
.r-legendary .divider{background:var(--legendary)}
.r-legendary .card-front::after{content:'';position:absolute;inset:-1px;border-radius:10px;
  border:1px solid transparent;
  background:linear-gradient(135deg,rgba(232,183,57,0.2),transparent 40%,transparent 60%,rgba(232,183,57,0.15)) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
  animation:legendPulse 3s ease-in-out infinite}
@keyframes legendPulse{0%,100%{opacity:0.5}50%{opacity:1}}

/* ===== RESULT OVERLAY ===== */
#result{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;
  background:rgba(4,5,8,0.92);backdrop-filter:blur(30px) saturate(0.5);opacity:0;pointer-events:none;
  transition:opacity 0.4s}
#result.show{opacity:1;pointer-events:auto}

.res-wrap{display:flex;flex-direction:column;align-items:center;transform:scale(0.9) translateY(20px);
  opacity:0;transition:all 0.5s 0.15s cubic-bezier(0.16,1,0.3,1)}
#result.show .res-wrap{transform:scale(1) translateY(0);opacity:1}

.res-card{width:300px;border-radius:14px;overflow:hidden;position:relative}
.res-card .res-inner{padding:36px 28px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px}

.res-card .res-rarity{font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;padding:4px 14px;
  border-radius:20px;border:1px solid}
.res-card .res-icon{font-size:40px;margin:4px 0}
.res-card .res-name{font-size:24px;font-weight:900;letter-spacing:1px}
.res-card .res-sub{font-size:11px;font-weight:400;letter-spacing:1px;opacity:0.4;text-transform:uppercase}
.res-card .res-val{font-size:32px;font-weight:900;margin-top:4px}
.res-card .res-car{width:220px;height:90px;margin:8px 0}
.res-card .res-car img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.5))}

.res-card .res-stats{display:flex;gap:12px;margin-top:10px;width:100%}
.res-card .rs-item{flex:1;text-align:center}
.res-card .rs-label{font-size:8px;font-weight:500;letter-spacing:2px;text-transform:uppercase;opacity:0.3}
.res-card .rs-track{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin:4px 0;overflow:hidden}
.res-card .rs-fill{height:100%;border-radius:2px;width:0;transition:width 1.2s 0.5s cubic-bezier(0.16,1,0.3,1)}
.res-card .rs-num{font-size:12px;font-weight:700}

/* Result rarity themes */
.res-common .res-inner{background:linear-gradient(160deg,#1a1c22,#13151a)}
.res-common .res-rarity{border-color:rgba(139,145,154,0.3);color:var(--common)}
.res-common .res-name{color:var(--common)}
.res-common .res-val{color:var(--common)}
.res-common .rs-fill{background:var(--common)}

.res-rare .res-inner{background:linear-gradient(160deg,#0f1628,#0c1220)}
.res-rare .res-rarity{border-color:rgba(74,143,231,0.3);color:var(--rare)}
.res-rare .res-name{color:var(--rare)}
.res-rare .res-val{color:var(--rare)}
.res-rare .rs-fill{background:var(--rare)}

.res-epic .res-inner{background:linear-gradient(160deg,#170f28,#120c20)}
.res-epic .res-rarity{border-color:rgba(155,109,255,0.3);color:var(--epic)}
.res-epic .res-name{color:var(--epic)}
.res-epic .res-val{color:var(--epic)}
.res-epic .rs-fill{background:var(--epic)}

.res-legendary .res-inner{background:linear-gradient(160deg,#1a1508,#14100a)}
.res-legendary .res-rarity{border-color:rgba(232,183,57,0.4);color:var(--legendary)}
.res-legendary .res-name{color:var(--legendary)}
.res-legendary .res-val{color:var(--legendary);text-shadow:0 0 30px rgba(232,183,57,0.4)}
.res-legendary .rs-fill{background:var(--legendary)}
.res-legendary .res-card{box-shadow:0 0 60px rgba(232,183,57,0.08),0 0 120px rgba(232,183,57,0.04)}

/* ===== CLOSE ===== */
.res-close{position:absolute;top:28px;right:32px;width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);
  font-size:16px;font-weight:300;transition:all 0.3s;z-index:110}
.res-close:hover{background:rgba(255,60,60,0.1);border-color:rgba(255,60,60,0.2);color:rgba(255,100,100,0.8)}

/* ===== COLLECT ===== */
.collect{margin-top:28px;padding:12px 44px;border-radius:6px;font-size:11px;font-weight:600;
  letter-spacing:3px;text-transform:uppercase;cursor:pointer;background:transparent;
  transition:all 0.3s;border:1px solid}
.collect:hover{filter:brightness(1.2);transform:translateY(-1px)}
.collect-common{border-color:rgba(139,145,154,0.3);color:var(--common)}
.collect-rare{border-color:rgba(74,143,231,0.3);color:var(--rare)}
.collect-epic{border-color:rgba(155,109,255,0.3);color:var(--epic)}
.collect-legendary{border-color:rgba(232,183,57,0.4);color:var(--legendary)}

/* ===== SHAKE ===== */
@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-4px,-2px)}50%{transform:translate(4px,2px)}75%{transform:translate(-2px,4px)}}
.shaking{animation:shake 0.4s ease}

/* ===== FADE IN ===== */
@keyframes fadeIn{to{opacity:1}}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="fx"></canvas>
<div class="atmos"></div>
<div class="noise"></div>
<div class="screen-flash" id="flash"></div>

<div id="app">
  <div class="hdr">
    <div class="hdr-brand">
      <div class="mark">UG</div>
      <div class="name">Card Case</div>
    </div>
    <div class="hdr-price">Cena: <span>$5,000</span></div>
  </div>

  <div class="field" id="field"></div>

  <div class="instruction" id="inst">
    <span class="line"></span>Izaberi kartu<span class="line"></span>
  </div>
</div>

<div id="result">
  <div class="res-close" onclick="closeCase()">&times;</div>
  <div class="res-wrap" id="resWrap"></div>
</div>

<script>
// ===== PARTICLES =====
var bgC=document.getElementById('bg'),bgX=bgC.getContext('2d');
var fxC=document.getElementById('fx'),fxX=fxC.getContext('2d');
var dots=[],confetti=[];
function resize(){bgC.width=fxC.width=innerWidth;bgC.height=fxC.height=innerHeight}
resize();addEventListener('resize',resize);

for(var i=0;i<50;i++)dots.push({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  vx:(Math.random()-0.5)*0.15,vy:(Math.random()-0.5)*0.15,
  r:Math.random()*1.2+0.3,a:Math.random()*0.15+0.03});

function drawBg(){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  for(var i=0;i<dots.length;i++){
    var d=dots[i];d.x+=d.vx;d.y+=d.vy;
    if(d.x<0)d.x=bgC.width;if(d.x>bgC.width)d.x=0;
    if(d.y<0)d.y=bgC.height;if(d.y>bgC.height)d.y=0;
    bgX.beginPath();bgX.arc(d.x,d.y,d.r,0,6.28);bgX.fillStyle='rgba(201,168,76,'+d.a+')';bgX.fill();
  }
  requestAnimationFrame(drawBg);
}
drawBg();

function drawFx(){
  fxX.clearRect(0,0,fxC.width,fxC.height);
  if(!confetti.length){requestAnimationFrame(drawFx);return;}
  var alive=false;
  for(var i=0;i<confetti.length;i++){
    var c=confetti[i];if(c.life<=0)continue;
    c.x+=c.vx;c.y+=c.vy;c.vy+=0.25;c.vx*=0.99;c.rot+=c.rs;c.life-=0.008;alive=true;
    fxX.save();fxX.translate(c.x,c.y);fxX.rotate(c.rot*Math.PI/180);fxX.globalAlpha=Math.max(0,c.life);
    fxX.fillStyle=c.col;fxX.fillRect(-c.w/2,-c.h/2,c.w,c.h);fxX.restore();
  }
  if(!alive)confetti=[];
  requestAnimationFrame(drawFx);
}
drawFx();

function burst(n,cols){
  var cx=fxC.width/2,cy=fxC.height/2-60;
  for(var i=0;i<n;i++){
    var a=Math.random()*6.28,sp=Math.random()*12+4;
    confetti.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-6,
      rot:Math.random()*360,rs:(Math.random()-0.5)*8,
      w:Math.random()*6+2,h:Math.random()*3+1,
      col:cols[Math.floor(Math.random()*cols.length)],life:1});
  }
}

// ===== STATE =====
var cards=[],chosen=false,reward=null;
var SUITS=['♠','♥','♦','♣'];
var suit=SUITS[Math.floor(Math.random()*4)];

// ===== BUILD CARDS =====
function build(){
  var f=document.getElementById('field');f.innerHTML='';cards=[];
  for(var i=0;i<5;i++){
    var el=document.createElement('div');
    el.className='card';el.setAttribute('data-i',i);
    el.innerHTML=
      '<div class="card-inner">'+
        '<div class="card-face card-back">'+
          '<div class="shimmer"></div>'+
          '<div class="emblem"><span>'+suit+'</span></div>'+
          '<div class="card-id">#'+(i+1)+'</div>'+
        '</div>'+
        '<div class="card-face card-front" id="cf'+i+'"></div>'+
      '</div>';
    el.onclick=(function(idx){return function(){pick(idx)}})(i);
    f.appendChild(el);cards.push(el);
    (function(el,i){setTimeout(function(){el.classList.add('entered')},200+i*100)})(el,i);
  }
}

// ===== PICK =====
function pick(idx){
  if(chosen)return;chosen=true;
  document.getElementById('inst').classList.add('hidden');

  cards[idx].classList.add('picked');
  for(var i=0;i<5;i++)if(i!==idx)cards[i].classList.add('dimmed');

  setTimeout(function(){
    cards[idx].classList.add('flipped');

    setTimeout(function(){
      var fl=document.getElementById('flash');
      fl.style.background=reward&&reward.rarity==='legendary'?'rgba(232,183,57,0.15)':'rgba(255,255,255,0.06)';
      fl.classList.add('fire');setTimeout(function(){fl.classList.remove('fire')},120);
    },400);

    setTimeout(function(){showResult()},1000);
  },500);
}

// ===== FILL CARD FRONTS =====
function fillCards(data){
  reward=data;
  var winIdx=Math.floor(Math.random()*5);
  var fakes=[
    {name:'Bravura',type:'vehicle',rarity:'common',label:'Gradski auto',value:'Bravura',speed:4.2,accel:3.8,handling:4.5},
    {name:'$5,000',type:'money',rarity:'common',label:'Novac',value:'5000'},
    {name:'Sentinel',type:'vehicle',rarity:'rare',label:'Sedan',value:'Sentinel',speed:6.1,accel:5.5,handling:6.0},
    {name:'LVL 2',type:'level',rarity:'common',label:'Iskustvo',value:'2'},
    {name:'50 RP',type:'respect',rarity:'common',label:'Respekt',value:'50'}
  ];

  for(var i=0;i<5;i++){
    var d=i===winIdx?data:fakes[i%fakes.length];
    var front=document.getElementById('cf'+i);
    cards[i].classList.add('r-'+d.rarity);

    var h='<div class="rarity-bar"></div>'+
      '<div class="reward-type">'+typeLabel(d.type)+'</div>'+
      '<div class="reward-name">'+d.name+'</div>'+
      '<div class="reward-sub">'+d.label+'</div>'+
      '<div class="divider"></div>'+
      '<div class="reward-val">'+valDisplay(d)+'</div>';

    if(d.type==='vehicle'){
      h+='<div class="vehicle-stats">'+
        vstat('SPD',d.speed,'var(--'+d.rarity+')')+
        vstat('ACC',d.accel,'var(--'+d.rarity+')')+
        vstat('HND',d.handling,'var(--'+d.rarity+')')+
      '</div>';
    }
    front.innerHTML=h;

    // Animate stat bars after flip
    (function(front,d){
      setTimeout(function(){
        var fills=front.querySelectorAll('.vfill');
        for(var j=0;j<fills.length;j++){
          fills[j].style.width=fills[j].getAttribute('data-w')+'%';
        }
      },1200);
    })(front,d);
  }
}

function typeLabel(t){return{vehicle:'Vozilo',money:'Novac',level:'Iskustvo',respect:'Respekt',weapon:'Oruzje',vip:'VIP'}[t]||t}
function valDisplay(d){if(d.type==='money')return '$'+Number(d.value).toLocaleString();if(d.type==='level')return 'LVL '+d.value;if(d.type==='respect')return d.value+' RP';return''}
function vstat(lbl,val,col){
  var pct=Math.round((val/10)*100);
  return'<div class="vstat"><div class="vlabel">'+lbl+'</div><div class="vbar"><div class="vfill" data-w="'+pct+'" style="background:'+col+'"></div></div><div class="vval">'+val.toFixed(1)+'</div></div>';
}

// ===== RESULT =====
function showResult(){
  if(!reward)return;
  var r=reward;
  var rs=document.getElementById('result');
  var w=document.getElementById('resWrap');

  var h='<div class="res-card res-'+r.rarity+'"><div class="res-inner">'+
    '<div class="res-rarity">'+rarityLabel(r.rarity)+'</div>'+
    '<div class="res-icon">'+rIcon(r.type)+'</div>'+
    '<div class="res-name">'+r.name+'</div>'+
    '<div class="res-sub">'+r.label+'</div>'+
    (r.type==='vehicle'?'<div class="res-car"><img src="'+carImg(r.name)+'" onerror="this.style.display=\'none\'"></div>':'')+
    '<div class="res-val">'+valDisplay(r)+'</div>'+
    (r.type==='vehicle'?
      '<div class="res-stats">'+
        rsItem('BRZINA',r.speed,'var(--'+r.rarity+')')+
        rsItem('UBRZANJE',r.accel,'var(--'+r.rarity+')')+
        rsItem('KONTROLA',r.handling,'var(--'+r.rarity+')')+
      '</div>':'')+
  '</div></div>'+
  '<button class="collect collect-'+r.rarity+'" onclick="collect()">POKUPI</button>';

  w.innerHTML=h;
  rs.classList.add('show');

  setTimeout(function(){
    var fills=document.querySelectorAll('.rs-fill');
    for(var i=0;i<fills.length;i++)fills[i].style.width=fills[i].getAttribute('data-w')+'%';
  },100);

  if(r.rarity==='legendary'){
    burst(150,['#e8b739','#c9a84c','#fff','#f5d67b','#d4a017']);
    document.body.classList.add('shaking');setTimeout(function(){document.body.classList.remove('shaking')},400);
  }else if(r.rarity==='epic'){
    burst(80,['#9b6dff','#7c4dff','#fff','#b794f6']);
  }else if(r.rarity==='rare'){
    burst(40,['#4a8fe7','#74b9ff','#fff']);
  }else{
    burst(15,['#8b919a','#bcc3cc']);
  }
}

function rarityLabel(r){return{common:'Common',rare:'Rare',epic:'Epic',legendary:'Legendary'}[r]||r}
function rIcon(t){return{vehicle:'&#9650;',money:'&#9670;',level:'&#9733;',respect:'&#9813;',weapon:'&#9654;',vip:'&#9818;'}[t]||'&#9670;'}
function carImg(n){return'https://gtamag.com/images/gta-sa-'+n.toLowerCase().replace(/\s/g,'-')+'.png'}
function rsItem(lbl,val,col){
  var pct=Math.round((val/10)*100);
  return'<div class="rs-item"><div class="rs-label">'+lbl+'</div><div class="rs-track"><div class="rs-fill" data-w="'+pct+'" style="background:'+col+'"></div></div><div class="rs-num">'+val.toFixed(1)+'</div></div>';
}

// ===== ACTIONS =====
function collect(){if(typeof cef!=='undefined'&&cef.emit)cef.emit('cardcase:collect');closeCase()}
function closeCase(){if(typeof cef!=='undefined'&&cef.emit)cef.emit('cardcase:close');document.getElementById('result').classList.remove('show')}

// ===== CEF EVENTS =====
if(typeof cef!=='undefined'&&cef.addEventListener){
  cef.addEventListener('cardcase:init',function(name,type,rarity,label,value,speed,accel,handling){
    fillCards({name:name,type:type,rarity:rarity,label:label,value:value,
      speed:parseFloat(speed)||5,accel:parseFloat(accel)||5,handling:parseFloat(handling)||5});
  });
}

// ===== AUTO INIT =====
build();
if(typeof cef==='undefined'){
  setTimeout(function(){
    fillCards({name:'Infernus',type:'vehicle',rarity:'legendary',label:'Super auto',value:'Infernus',speed:9.7,accel:9.2,handling:8.8});
  },1200);
}
</script>
</body>
</html>
