<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG Card Case</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#000;color:#fff;font-family:'Orbitron',sans-serif;user-select:none;-webkit-font-smoothing:antialiased}

/* ===== CANVASES ===== */
canvas#bgCanvas{position:fixed;inset:0;z-index:0}
canvas#fxCanvas{position:fixed;inset:0;z-index:300;pointer-events:none}

/* ===== ATMOSPHERE ===== */
.atmos{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(74,0,128,0.12) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(157,78,221,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 30%,rgba(106,13,173,0.06) 0%,transparent 40%)}
.vig{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 65% 60% at 50% 45%,transparent 0%,rgba(0,0,0,0.4) 70%,rgba(0,0,0,0.85) 100%)}
.flash{position:fixed;inset:0;z-index:299;pointer-events:none;opacity:0;transition:opacity 0.06s}
.flash.on{opacity:1}

/* ===== APP ===== */
#app{position:relative;z-index:5;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ===== HEADER ===== */
.hdr{position:absolute;top:0;left:0;right:0;padding:20px 28px;display:flex;justify-content:space-between;align-items:center;z-index:20;
  opacity:0;animation:fadeUp .7s .2s ease forwards}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{font-size:20px;font-weight:900;letter-spacing:6px;color:#9d4edd;text-shadow:0 0 20px rgba(157,78,221,0.5),0 0 40px rgba(157,78,221,0.2)}
.hdr-sub{font-size:8px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:rgba(157,78,221,0.4)}
.hdr-price{font-size:9px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,0.3);
  padding:6px 16px;border:1px solid rgba(157,78,221,0.2);border-radius:4px;
  box-shadow:0 0 10px rgba(157,78,221,0.1)}
.hdr-price b{color:#c084fc;font-weight:700}

/* ===== HINT ===== */
.hint{position:absolute;bottom:24px;width:100%;text-align:center;z-index:20;
  font-size:9px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:rgba(157,78,221,0.25);
  opacity:0;animation:fadeIn .5s 2s forwards;transition:opacity .5s}
.hint.gone{opacity:0!important}

/* ===== STAGE ===== */
.stage{display:flex;align-items:flex-end;justify-content:center;gap:40px;perspective:2000px;padding-bottom:20px}

/* ===== PLATFORM ===== */
.platform{width:180px;height:40px;border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse,rgba(74,0,128,0.4) 0%,rgba(42,0,51,0.2) 50%,transparent 70%);
  box-shadow:0 0 40px rgba(157,78,221,0.2),0 0 80px rgba(74,0,128,0.1);
  animation:platformPulse 3s ease-in-out infinite}
.platform::before{content:'';position:absolute;top:-4px;left:10%;right:10%;height:8px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(157,78,221,0.5),transparent 70%);
  filter:blur(4px);animation:platformPulse 3s ease-in-out infinite}
@keyframes platformPulse{0%,100%{opacity:.7}50%{opacity:1}}

/* ===== CARD WRAPPER ===== */
.cw{display:flex;flex-direction:column;align-items:center;gap:0}

/* ===== CARD ===== */
.card{width:140px;height:200px;position:relative;cursor:pointer;transform-style:preserve-3d;
  margin-bottom:-10px;
  opacity:0;transform:translateY(60px) scale(0.8);
  transition:transform .5s cubic-bezier(.16,1,.3,1),opacity .5s,filter .4s;
  animation:none}
.card.landed{opacity:1;transform:translateY(0) scale(1);animation:cardFloat 3s ease-in-out infinite}
.card:hover{transform:translateY(-20px) scale(1.08)!important;animation:none!important;z-index:50}
.card.chosen{transform:translateY(-50px) scale(1.15)!important;animation:none!important;z-index:60}
.card.dead{opacity:0!important;transform:scale(0.5) translateY(40px)!important;pointer-events:none;filter:blur(3px) brightness(0.2);animation:none!important}

.card-body{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .8s cubic-bezier(.4,0,.2,1)}
.card.open .card-body{transform:rotateY(180deg)}

.card-side{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;overflow:hidden}

/* ===== CARD BACK ===== */
.back{
  background:linear-gradient(145deg,#0a0a2a,#1a0033);
  border:2px solid rgba(157,78,221,0.4);
  box-shadow:0 0 20px rgba(157,78,221,0.3),0 0 40px rgba(106,13,173,0.15),inset 0 0 30px rgba(26,0,51,0.5);
  display:flex;align-items:center;justify-content:center}
.back .pat{position:absolute;inset:0;
  background:
    repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(157,78,221,0.03) 8px,rgba(157,78,221,0.03) 9px),
    repeating-linear-gradient(-45deg,transparent,transparent 8px,rgba(157,78,221,0.03) 8px,rgba(157,78,221,0.03) 9px)}
.back .b1{position:absolute;inset:6px;border:1px solid rgba(157,78,221,0.12);border-radius:7px}
.back .b2{position:absolute;inset:12px;border:1px solid rgba(157,78,221,0.06);border-radius:5px}
.back .suit-big{font-size:64px;color:rgba(157,78,221,0.15);position:relative;z-index:2;
  text-shadow:0 0 30px rgba(157,78,221,0.2),0 0 60px rgba(157,78,221,0.1)}
.back .corner{position:absolute;z-index:3;display:flex;flex-direction:column;align-items:center;gap:0}
.back .c-tl{top:8px;left:10px}
.back .c-br{bottom:8px;right:10px;transform:rotate(180deg)}
.back .c-val{font-size:14px;font-weight:800;color:rgba(157,78,221,0.3);line-height:1}
.back .c-suit{font-size:10px;color:rgba(157,78,221,0.2);line-height:1;margin-top:1px}

/* Holo shimmer */
.back .holo{position:absolute;inset:0;border-radius:10px;pointer-events:none;
  background:linear-gradient(105deg,transparent 25%,
    rgba(157,78,221,0.06) 37%,rgba(0,255,255,0.04) 43%,rgba(157,78,221,0.06) 48%,
    rgba(255,0,128,0.03) 53%,transparent 65%);
  background-size:300% 100%;animation:holo 5s ease-in-out infinite}
@keyframes holo{0%,100%{background-position:300% 0}50%{background-position:-300% 0}}

/* Neon hover glow */
.card:hover .back{box-shadow:0 0 30px rgba(157,78,221,0.5),0 0 60px rgba(157,78,221,0.2),0 0 100px rgba(157,78,221,0.1),inset 0 0 30px rgba(26,0,51,0.5);
  border-color:rgba(157,78,221,0.7)}

@keyframes cardFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1)}}

/* ===== CARD FRONT ===== */
.front{
  transform:rotateY(180deg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px;text-align:center;position:relative}

.front::before{content:'';position:absolute;inset:-2px;border-radius:12px;pointer-events:none;z-index:5}

.front .r-line{position:absolute;top:0;left:20px;right:20px;height:2px;border-radius:1px}
.front .r-tag{font-size:6px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  padding:2px 10px;border-radius:2px;border:1px solid;margin-top:10px}
.front .r-suit{font-size:22px;margin:4px 0}
.front .r-name{font-size:13px;font-weight:800;letter-spacing:1px}
.front .r-sub{font-size:7px;font-weight:400;letter-spacing:2px;text-transform:uppercase;opacity:0.4;margin-top:1px}
.front .r-div{width:20px;height:1px;margin:6px 0;opacity:0.15}
.front .r-val{font-size:20px;font-weight:900}

/* Stats */
.front .stats{display:flex;gap:3px;width:100%;margin-top:4px}
.front .st{flex:1;text-align:center}
.front .st .sl{font-size:5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;opacity:0.3}
.front .st .sb{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;margin:2px 0;overflow:hidden}
.front .st .sf{height:100%;border-radius:1px;width:0;transition:width 1s .3s ease-out}
.front .st .sn{font-size:8px;font-weight:700}

/* ===== RARITY THEMES ===== */
.t-common .front{background:linear-gradient(145deg,#12141a,#0d0f14);border:2px solid rgba(107,114,128,0.25);
  box-shadow:0 0 15px rgba(107,114,128,0.1),inset 0 0 20px rgba(0,0,0,0.3)}
.t-common .front::before{border:1px solid rgba(107,114,128,0.15)}
.t-common .r-line,.t-common .r-div{background:#6b7280}
.t-common .r-tag{border-color:rgba(107,114,128,0.2);color:#9ca3af}
.t-common .r-name{color:#9ca3af}
.t-common .r-val{color:#d1d5db}
.t-common .sf{background:#6b7280!important}
.t-common .r-suit{color:#9ca3af;text-shadow:0 0 8px rgba(107,114,128,0.3)}

.t-rare .front{background:linear-gradient(145deg,#0a1028,#060c1c);border:2px solid rgba(59,130,246,0.35);
  box-shadow:0 0 25px rgba(59,130,246,0.15),0 0 50px rgba(59,130,246,0.05),inset 0 0 20px rgba(0,0,0,0.3)}
.t-rare .front::before{border:1px solid rgba(59,130,246,0.2);box-shadow:0 0 10px rgba(59,130,246,0.1)}
.t-rare .r-line,.t-rare .r-div{background:#3b82f6}
.t-rare .r-tag{border-color:rgba(59,130,246,0.3);color:#60a5fa}
.t-rare .r-name{color:#60a5fa}
.t-rare .r-val{color:#93c5fd;text-shadow:0 0 10px rgba(59,130,246,0.3)}
.t-rare .sf{background:#3b82f6!important}
.t-rare .r-suit{color:#60a5fa;text-shadow:0 0 12px rgba(59,130,246,0.4)}

.t-epic .front{background:linear-gradient(145deg,#14082a,#0c0620);border:2px solid rgba(168,85,247,0.4);
  box-shadow:0 0 30px rgba(168,85,247,0.2),0 0 60px rgba(168,85,247,0.08),inset 0 0 20px rgba(0,0,0,0.3)}
.t-epic .front::before{border:1px solid rgba(168,85,247,0.25);box-shadow:0 0 15px rgba(168,85,247,0.15)}
.t-epic .r-line,.t-epic .r-div{background:#a855f7}
.t-epic .r-tag{border-color:rgba(168,85,247,0.35);color:#c084fc}
.t-epic .r-name{color:#c084fc}
.t-epic .r-val{color:#d8b4fe;text-shadow:0 0 15px rgba(168,85,247,0.4)}
.t-epic .sf{background:#a855f7!important}
.t-epic .r-suit{color:#c084fc;text-shadow:0 0 15px rgba(168,85,247,0.5)}

.t-legendary .front{background:linear-gradient(145deg,#1a1000,#120a00);border:2px solid rgba(245,158,11,0.5);
  box-shadow:0 0 40px rgba(245,158,11,0.2),0 0 80px rgba(245,158,11,0.08),0 0 120px rgba(245,158,11,0.03),inset 0 0 20px rgba(0,0,0,0.3)}
.t-legendary .front::before{border:1px solid rgba(245,158,11,0.3);box-shadow:0 0 20px rgba(245,158,11,0.15);
  animation:lgGlow 2.5s ease-in-out infinite}
.t-legendary .r-line,.t-legendary .r-div{background:#f59e0b}
.t-legendary .r-tag{border-color:rgba(245,158,11,0.5);color:#fbbf24;animation:lgGlow 2.5s ease-in-out infinite}
.t-legendary .r-name{color:#fbbf24}
.t-legendary .r-val{color:#fde68a;text-shadow:0 0 20px rgba(245,158,11,0.5),0 0 40px rgba(245,158,11,0.2)}
.t-legendary .sf{background:#f59e0b!important}
.t-legendary .r-suit{color:#fbbf24;text-shadow:0 0 20px rgba(245,158,11,0.6),0 0 40px rgba(245,158,11,0.2)}
@keyframes lgGlow{0%,100%{opacity:.6}50%{opacity:1}}

/* ===== RESULT ===== */
#result{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.9);backdrop-filter:blur(30px);opacity:0;pointer-events:none;transition:opacity .5s}
#result.show{opacity:1;pointer-events:auto}

.rw{display:flex;flex-direction:column;align-items:center;
  transform:scale(0.8) translateY(30px);opacity:0;transition:all .6s .1s cubic-bezier(.16,1,.3,1)}
#result.show .rw{transform:scale(1) translateY(0);opacity:1}

.rc{width:320px;border-radius:14px;overflow:hidden;position:relative}
.rc-inner{padding:36px 28px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px;position:relative}

.rc .rc-c{position:absolute;z-index:6;font-weight:900;opacity:0.12}
.rc .rc-tl{top:14px;left:16px;font-size:16px;text-align:center;line-height:1}
.rc .rc-tl .rc-s{font-size:12px}
.rc .rc-br{bottom:14px;right:16px;font-size:16px;text-align:center;line-height:1;transform:rotate(180deg)}
.rc .rc-br .rc-s{font-size:12px}

.rc .rc-badge{font-size:6px;font-weight:700;letter-spacing:4px;text-transform:uppercase;padding:3px 12px;
  border-radius:2px;border:1px solid}
.rc .rc-suit{font-size:44px;line-height:1;margin:6px 0}
.rc .rc-name{font-size:24px;font-weight:900;letter-spacing:2px}
.rc .rc-sub{font-size:8px;font-weight:400;letter-spacing:2px;text-transform:uppercase;opacity:0.35}
.rc .rc-val{font-size:34px;font-weight:900;margin-top:4px}
.rc .rc-car{width:240px;height:90px;margin:4px 0}
.rc .rc-car img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.5))}

.rc .rc-bars{display:flex;gap:12px;margin-top:10px;width:100%}
.rc .rb{flex:1;text-align:center}
.rc .rb .rbl{font-size:6px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;opacity:0.25}
.rc .rb .rbb{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;margin:3px 0;overflow:hidden}
.rc .rb .rbf{height:100%;border-radius:2px;width:0;transition:width 1.2s .4s cubic-bezier(.16,1,.3,1)}
.rc .rb .rbn{font-size:10px;font-weight:700}

/* Result rarity */
.rc-common .rc-inner{background:linear-gradient(145deg,#12141a,#0d0f14);border:2px solid rgba(107,114,128,0.2);
  box-shadow:0 0 30px rgba(107,114,128,0.05)}
.rc-common .rc-badge{border-color:rgba(107,114,128,0.2);color:#9ca3af}
.rc-common .rc-suit{color:#9ca3af;text-shadow:0 0 8px rgba(107,114,128,0.3)}
.rc-common .rc-name{color:#9ca3af}
.rc-common .rc-val{color:#d1d5db}
.rc-common .rbf{background:#6b7280}

.rc-rare .rc-inner{background:linear-gradient(145deg,#0a1028,#060c1c);border:2px solid rgba(59,130,246,0.3);
  box-shadow:0 0 40px rgba(59,130,246,0.08)}
.rc-rare .rc-badge{border-color:rgba(59,130,246,0.3);color:#60a5fa}
.rc-rare .rc-suit{color:#60a5fa;text-shadow:0 0 15px rgba(59,130,246,0.4)}
.rc-rare .rc-name{color:#60a5fa}
.rc-rare .rc-val{color:#93c5fd;text-shadow:0 0 10px rgba(59,130,246,0.3)}
.rc-rare .rbf{background:#3b82f6}

.rc-epic .rc-inner{background:linear-gradient(145deg,#14082a,#0c0620);border:2px solid rgba(168,85,247,0.35);
  box-shadow:0 0 50px rgba(168,85,247,0.1)}
.rc-epic .rc-badge{border-color:rgba(168,85,247,0.35);color:#c084fc}
.rc-epic .rc-suit{color:#c084fc;text-shadow:0 0 20px rgba(168,85,247,0.5)}
.rc-epic .rc-name{color:#c084fc}
.rc-epic .rc-val{color:#d8b4fe;text-shadow:0 0 15px rgba(168,85,247,0.4)}
.rc-epic .rbf{background:#a855f7}

.rc-legendary .rc-inner{background:linear-gradient(145deg,#1a1000,#120a00);border:2px solid rgba(245,158,11,0.45);
  box-shadow:0 0 60px rgba(245,158,11,0.12),0 0 120px rgba(245,158,11,0.04);
  animation:rcLg 3s ease-in-out infinite}
.rc-legendary .rc-badge{border-color:rgba(245,158,11,0.5);color:#fbbf24}
.rc-legendary .rc-suit{color:#fbbf24;text-shadow:0 0 25px rgba(245,158,11,0.5),0 0 50px rgba(245,158,11,0.2)}
.rc-legendary .rc-name{color:#fbbf24}
.rc-legendary .rc-val{color:#fde68a;text-shadow:0 0 20px rgba(245,158,11,0.5),0 0 50px rgba(245,158,11,0.2)}
.rc-legendary .rbf{background:#f59e0b}
@keyframes rcLg{0%,100%{box-shadow:0 0 60px rgba(245,158,11,0.12),0 0 120px rgba(245,158,11,0.04)}50%{box-shadow:0 0 80px rgba(245,158,11,0.18),0 0 150px rgba(245,158,11,0.06)}}

/* Close */
.rc-close{position:absolute;top:18px;right:20px;width:32px;height:32px;border-radius:50%;
  background:rgba(157,78,221,0.05);border:1px solid rgba(157,78,221,0.1);cursor:pointer;
  display:grid;place-items:center;color:rgba(157,78,221,0.4);font-size:14px;font-weight:300;
  transition:all .3s;z-index:210}
.rc-close:hover{background:rgba(255,40,40,0.08);border-color:rgba(255,40,40,0.15);color:rgba(255,80,80,0.5)}

/* Collect */
.btn{margin-top:24px;padding:10px 44px;border-radius:6px;font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:4px;text-transform:uppercase;cursor:pointer;background:transparent;transition:all .3s;border:2px solid;
  position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s}
.btn:hover{transform:translateY(-2px);filter:brightness(1.3)}
.btn:hover::before{opacity:1}
.btn-common{border-color:rgba(107,114,128,0.25);color:#9ca3af}.btn-common::before{background:rgba(107,114,128,0.05)}
.btn-rare{border-color:rgba(59,130,246,0.3);color:#60a5fa}.btn-rare::before{background:rgba(59,130,246,0.05)}
.btn-epic{border-color:rgba(168,85,247,0.35);color:#c084fc}.btn-epic::before{background:rgba(168,85,247,0.05)}
.btn-legendary{border-color:rgba(245,158,11,0.45);color:#fbbf24}.btn-legendary::before{background:rgba(245,158,11,0.05)}

/* ===== ANIMS ===== */
@keyframes fadeIn{to{opacity:1}}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translate(0)}25%{transform:translate(-5px,-3px)}50%{transform:translate(5px,3px)}75%{transform:translate(-3px,5px)}}
.shaking{animation:shake .35s ease}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="fxCanvas"></canvas>
<div class="atmos"></div>
<div class="vig"></div>
<div class="flash" id="flash"></div>

<div id="app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo">UG</div>
      <div class="hdr-sub">Card Case</div>
    </div>
    <div class="hdr-price">Cena <b>$5,000</b></div>
  </div>
  <div class="stage" id="stage"></div>
  <div class="hint" id="hint">Izaberi kartu</div>
</div>

<div id="result">
  <div class="rc-close" onclick="closeCase()">&times;</div>
  <div class="rw" id="rw"></div>
</div>

<script>
// ===== DECK =====
var DECK=[
  {v:'A',s:'♠'},{v:'K',s:'♠'},{v:'Q',s:'♠'},{v:'J',s:'♠'},{v:'10',s:'♠'},
  {v:'A',s:'♥'},{v:'K',s:'♥'},{v:'Q',s:'♥'},{v:'J',s:'♥'},{v:'10',s:'♥'},
  {v:'A',s:'♦'},{v:'K',s:'♦'},{v:'Q',s:'♦'},{v:'J',s:'♦'},{v:'10',s:'♦'},
  {v:'A',s:'♣'},{v:'K',s:'♣'},{v:'Q',s:'♣'},{v:'J',s:'♣'},{v:'10',s:'♣'}
];
var hand=[];var used={};
for(var i=0;i<5;i++){var idx;do{idx=Math.floor(Math.random()*DECK.length)}while(used[idx]);used[idx]=1;hand.push(DECK[idx])}
var isRed=function(s){return s==='♥'||s==='♦'};

// ===== PARTICLES =====
var bc=document.getElementById('bgCanvas'),bx=bc.getContext('2d');
var fc=document.getElementById('fxCanvas'),fx=fc.getContext('2d');
var pts=[],cfs=[];
function rsz(){bc.width=fc.width=innerWidth;bc.height=fc.height=innerHeight}
rsz();addEventListener('resize',rsz);

// Purple nebula particles
for(var i=0;i<100;i++)pts.push({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.15,
  r:Math.random()*1.5+.3,
  a:Math.random()*.2+.02,
  c:['157,78,221','106,13,173','192,132,252','74,0,128'][Math.floor(Math.random()*4)]});

function drawBg(){
  bx.clearRect(0,0,bc.width,bc.height);
  // Purple ambient glow
  var g=bx.createRadialGradient(bc.width/2,bc.height*.4,0,bc.width/2,bc.height*.4,bc.width*.5);
  g.addColorStop(0,'rgba(74,0,128,0.03)');g.addColorStop(0.5,'rgba(106,13,173,0.015)');g.addColorStop(1,'transparent');
  bx.fillStyle=g;bx.fillRect(0,0,bc.width,bc.height);

  for(var i=0;i<pts.length;i++){
    var p=pts[i];p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=bc.width;if(p.x>bc.width)p.x=0;
    if(p.y<0)p.y=bc.height;if(p.y>bc.height)p.y=0;
    bx.beginPath();bx.arc(p.x,p.y,p.r,0,6.28);
    bx.fillStyle='rgba('+p.c+','+p.a+')';bx.fill();
  }
  requestAnimationFrame(drawBg);
}
drawBg();

function drawFx(){
  fx.clearRect(0,0,fc.width,fc.height);
  if(!cfs.length){requestAnimationFrame(drawFx);return}
  var alive=false;
  for(var i=0;i<cfs.length;i++){
    var c=cfs[i];if(c.life<=0)continue;
    c.x+=c.vx;c.y+=c.vy;c.vy+=.2;c.vx*=.997;c.rot+=c.rs;c.life-=.005;alive=true;
    fx.save();fx.translate(c.x,c.y);fx.rotate(c.rot*Math.PI/180);
    fx.globalAlpha=Math.max(0,Math.min(1,c.life));
    fx.fillStyle=c.col;
    // Glow particle
    fx.shadowColor=c.col;fx.shadowBlur=8;
    fx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
    fx.restore();
  }
  if(!alive)cfs=[];
  requestAnimationFrame(drawFx);
}
drawFx();

function burst(n,cols){
  var cx=fc.width/2,cy=fc.height/2-80;
  for(var i=0;i<n;i++){
    var a=Math.random()*6.283,sp=Math.random()*16+6;
    cfs.push({x:cx+((Math.random()-.5)*80),y:cy,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-10,
      rot:Math.random()*360,rs:(Math.random()-.5)*12,
      w:Math.random()*5+2,h:Math.random()*3+1,
      col:cols[Math.floor(Math.random()*cols.length)],life:1});
  }
}

// ===== STATE =====
var cards=[],chosen=false,reward=null,winIdx=0;

// ===== BUILD =====
function build(){
  var st=document.getElementById('stage');st.innerHTML='';cards=[];
  for(var i=0;i<5;i++){
    var cd=hand[i];
    var wrapper=document.createElement('div');
    wrapper.className='cw';

    var el=document.createElement('div');
    el.className='card';el.setAttribute('data-i',i);
    var sCol=isRed(cd.s)?'#ef4444':'#c084fc';
    el.innerHTML=
      '<div class="card-body">'+
        '<div class="card-side back">'+
          '<div class="holo"></div>'+
          '<div class="pat"></div>'+
          '<div class="b1"></div>'+
          '<div class="b2"></div>'+
          '<div class="suit-big">'+cd.s+'</div>'+
          '<div class="corner c-tl"><div class="c-val" style="color:'+sCol+'">'+cd.v+'</div><div class="c-suit">'+cd.s+'</div></div>'+
          '<div class="corner c-br"><div class="c-val" style="color:'+sCol+'">'+cd.v+'</div><div class="c-suit">'+cd.s+'</div></div>'+
        '</div>'+
        '<div class="card-side front" id="f'+i+'"></div>'+
      '</div>';

    var plat=document.createElement('div');
    plat.className='platform';

    el.onclick=(function(idx){return function(){pick(idx)}})(i);
    wrapper.appendChild(el);
    wrapper.appendChild(plat);
    st.appendChild(wrapper);cards.push(el);
    (function(el,i){setTimeout(function(){el.classList.add('landed')},300+i*150)})(el,i);
  }
}

// ===== PICK =====
function pick(idx){
  if(chosen)return;chosen=true;
  document.getElementById('hint').classList.add('gone');
  cards[idx].classList.add('chosen');
  for(var i=0;i<5;i++)if(i!==idx)(function(j){setTimeout(function(){cards[j].classList.add('dead')},150+j*60)})(i);

  setTimeout(function(){
    cards[idx].classList.add('open');
    setTimeout(function(){
      var fl=document.getElementById('flash');
      if(reward&&reward.rarity==='legendary')fl.style.background='rgba(245,158,11,0.12)';
      else if(reward&&reward.rarity==='epic')fl.style.background='rgba(168,85,247,0.08)';
      else fl.style.background='rgba(157,78,221,0.05)';
      fl.classList.add('on');setTimeout(function(){fl.classList.remove('on')},80);
    },350);
    setTimeout(function(){showResult()},1000);
  },600);
}

// ===== FILL CARDS =====
function fillCards(data){
  reward=data;winIdx=Math.floor(Math.random()*5);
  var fakes=[
    {name:'Bravura',type:'vehicle',rarity:'common',label:'Gradski auto',value:'Bravura',speed:4.2,accel:3.8,handling:4.5},
    {name:'$5,000',type:'money',rarity:'common',label:'Novac',value:'5000'},
    {name:'Sentinel',type:'vehicle',rarity:'rare',label:'Sedan',value:'Sentinel',speed:6.1,accel:5.5,handling:6.0},
    {name:'LVL 2',type:'level',rarity:'common',label:'Iskustvo',value:'2'},
    {name:'50 RP',type:'respect',rarity:'common',label:'Respekt',value:'50'}
  ];
  for(var i=0;i<5;i++){
    var d=i===winIdx?data:fakes[i%fakes.length];
    var cd=hand[i];
    var front=document.getElementById('f'+i);
    cards[i].classList.add('t-'+d.rarity);
    var sCol=isRed(cd.s)?'#ef4444':'#c084fc';
    var rc={common:'6b7280',rare:'3b82f6',epic:'a855f7',legendary:'f59e0b'}[d.rarity]||'6b7280';
    var h='<div class="r-line" style="background:#'+rc+'"></div>'+
      '<div class="r-tag">'+rName(d.rarity)+'</div>'+
      '<div class="r-suit" style="color:'+sCol+';text-shadow:0 0 10px '+sCol+'">'+cd.s+'</div>'+
      '<div class="r-name">'+d.name+'</div>'+
      '<div class="r-sub">'+d.label+'</div>'+
      '<div class="r-div" style="background:#'+rc+'"></div>'+
      '<div class="r-val">'+dVal(d)+'</div>';
    if(d.type==='vehicle')h+='<div class="stats">'+mks('SPD',d.speed,'#'+rc)+mks('ACC',d.accel,'#'+rc)+mks('HND',d.handling,'#'+rc)+'</div>';
    front.innerHTML=h;
  }
}
function rName(r){return{common:'COMMON',rare:'RARE',epic:'EPIC',legendary:'LEGENDARY'}[r]||r}
function dVal(d){if(d.type==='money')return '$'+Number(d.value).toLocaleString();if(d.type==='level')return 'LVL '+d.value;if(d.type==='respect')return d.value+' RP';return''}
function mks(l,v,c){var p=Math.round((v/10)*100);return'<div class="st"><div class="sl">'+l+'</div><div class="sb"><div class="sf" data-w="'+p+'" style="background:'+c+'"></div></div><div class="sn">'+v.toFixed(1)+'</div></div>'}

// ===== RESULT =====
function showResult(){
  if(!reward)return;var r=reward,cd=hand[winIdx];
  var sCol=isRed(cd.s)?'#ef4444':'#c084fc';
  var rc={common:'6b7280',rare:'3b82f6',epic:'a855f7',legendary:'f59e0b'}[r.rarity]||'6b7280';
  var h='<div class="rc rc-'+r.rarity+'"><div class="rc-inner">'+
    '<div class="rc-c rc-tl"><div style="color:'+sCol+'">'+cd.v+'</div><div class="rc-s">'+cd.s+'</div></div>'+
    '<div class="rc-c rc-br"><div style="color:'+sCol+'">'+cd.v+'</div><div class="rc-s">'+cd.s+'</div></div>'+
    '<div class="rc-badge">'+rName(r.rarity)+'</div>'+
    '<div class="rc-suit" style="color:'+sCol+';text-shadow:0 0 20px '+sCol+'">'+cd.s+'</div>'+
    '<div class="rc-name">'+r.name+'</div>'+
    '<div class="rc-sub">'+r.label+'</div>'+
    (r.type==='vehicle'?'<div class="rc-car"><img src="https://gtamag.com/images/gta-sa-'+r.name.toLowerCase().replace(/\s/g,'-')+'.png" onerror="this.style.display=\'none\'"></div>':'')+
    '<div class="rc-val">'+dVal(r)+'</div>'+
    (r.type==='vehicle'?'<div class="rc-bars">'+mb('BRZINA',r.speed,'#'+rc)+mb('UBRZANJE',r.accel,'#'+rc)+mb('KONTROLA',r.handling,'#'+rc)+'</div>':'')+
  '</div></div>'+
  '<button class="btn btn-'+r.rarity+'" onclick="collect()">POKUPI</button>';
  document.getElementById('rw').innerHTML=h;
  document.getElementById('result').classList.add('show');
  setTimeout(function(){var fills=document.querySelectorAll('.rbf');for(var i=0;i<fills.length;i++)fills[i].style.width=fills[i].getAttribute('data-w')+'%'},100);
  if(r.rarity==='legendary'){burst(200,['#f59e0b','#fbbf24','#fff','#f0d060']);document.body.classList.add('shaking');setTimeout(function(){document.body.classList.remove('shaking')},350);setTimeout(function(){burst(80,['#f59e0b','#fff','#fbbf24'])},350);setTimeout(function(){burst(40,['#f59e0b','#fbbf24'])},700)}
  else if(r.rarity==='epic'){burst(120,['#a855f7','#c084fc','#fff','#8b5cf6']);setTimeout(function(){burst(40,['#a855f7','#fff'])},300)}
  else if(r.rarity==='rare')burst(60,['#3b82f6','#60a5fa','#fff']);
  else burst(20,['#6b7280','#9ca3af']);
}
function mb(l,v,c){var p=Math.round((v/10)*100);return'<div class="rb"><div class="rbl">'+l+'</div><div class="rbb"><div class="rbf" data-w="'+p+'" style="background:'+c+'"></div></div><div class="rbn">'+v.toFixed(1)+'</div></div>'}
function collect(){if(typeof cef!=='undefined'&&cef.emit)cef.emit('cardcase:collect');closeCase()}
function closeCase(){if(typeof cef!=='undefined'&&cef.emit)cef.emit('cardcase:close');document.getElementById('result').classList.remove('show')}
if(typeof cef!=='undefined'&&cef.addEventListener){cef.addEventListener('cardcase:init',function(name,type,rarity,label,value,speed,accel,handling){fillCards({name:name,type:type,rarity:rarity,label:label,value:value,speed:parseFloat(speed)||5,accel:parseFloat(accel)||5,handling:parseFloat(handling)||5})})}
build();
if(typeof cef==='undefined'){setTimeout(function(){fillCards({name:'Infernus',type:'vehicle',rarity:'legendary',label:'Super auto',value:'Infernus',speed:9.7,accel:9.2,handling:8.8})},1400)}
</script>
</body>
</html>
