<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UG Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0a12;
            color: #ffffff;
            user-select: none;
        }

        /* Animated background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 180, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 100, 200, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(3, 206, 194, 0.05) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -1%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
        }

        /* Particle grid effect */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.03;
            background-image: 
                linear-gradient(rgba(0, 180, 255, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 180, 255, 0.5) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Scan line effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
        }

        /* Main layout */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Left side - branding */
        .brand-section {
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .brand-logo {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            font-size: 96px;
            font-weight: 700;
            letter-spacing: 12px;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 0%, #00b4ff 50%, #03cec2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 30px rgba(0, 180, 255, 0.3));
            margin-bottom: 12px;
        }

        .brand-tagline {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(0, 180, 255, 0.6);
            margin-left: 4px;
        }

        .brand-line {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, #00b4ff, transparent);
            margin: 20px 0;
        }

        .brand-info {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            line-height: 1.8;
            letter-spacing: 1px;
        }

        /* Portal card - visual only, no input forms */
        .portal-card {
            width: 440px;
            background: rgba(12, 14, 26, 0.85);
            border: 1px solid rgba(0, 180, 255, 0.15);
            border-radius: 16px;
            padding: 40px 36px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 
                0 0 60px rgba(0, 180, 255, 0.08),
                0 25px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .portal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00b4ff, #03cec2, transparent);
        }

        .portal-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 180, 255, 0.03), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Welcome text */
        .welcome-text {
            text-align: center;
            margin-bottom: 24px;
        }

        .welcome-text .player-name {
            font-size: 22px;
            font-weight: 700;
            color: #00b4ff;
            letter-spacing: 1px;
        }

        .welcome-text .welcome-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
        }

        /* Status section */
        .status-section {
            text-align: center;
            padding: 20px 0;
        }

        .status-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-icon.login {
            background: rgba(0, 180, 255, 0.1);
            border: 2px solid rgba(0, 180, 255, 0.3);
        }

        .status-icon.register {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid rgba(0, 255, 136, 0.3);
        }

        .status-icon.success {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid rgba(0, 255, 136, 0.3);
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
            50% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.4); }
        }

        .status-icon svg {
            width: 28px;
            height: 28px;
        }

        .status-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .status-title.login {
            color: #00b4ff;
        }

        .status-title.register {
            color: #00ff88;
        }

        .status-title.success {
            color: #00ff88;
        }

        .status-message {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto;
        }

        /* Progress dots */
        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .progress-dot.active {
            background: #00b4ff;
            box-shadow: 0 0 10px rgba(0, 180, 255, 0.5);
        }

        .progress-dot.done {
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        /* Loading spinner */
        .spinner-container {
            text-align: center;
            margin-top: 24px;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(0, 180, 255, 0.2);
            border-top: 3px solid #00b4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        /* Server status */
        .server-status {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Version tag */
        .version-tag {
            position: fixed;
            bottom: 24px;
            right: 24px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 1px;
            z-index: 20;
        }

        /* Notification toast */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 100;
            transform: translateX(120%);
            transition: transform 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .toast.visible {
            transform: translateX(0);
        }

        .toast.error {
            background: rgba(239, 16, 51, 0.15);
            border: 1px solid rgba(239, 16, 51, 0.3);
            color: #ff6b7a;
        }

        .toast.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .toast.info {
            background: rgba(0, 180, 255, 0.1);
            border: 1px solid rgba(0, 180, 255, 0.3);
            color: #00b4ff;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            gap: 16px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .divider-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Steps info for registration */
        .steps-info {
            text-align: left;
            margin-top: 16px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
        }

        .step-item .step-num {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(0, 180, 255, 0.1);
            border: 1px solid rgba(0, 180, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: #00b4ff;
            flex-shrink: 0;
        }

        .step-item.completed .step-num {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }
    </style>
</head>
<body>
    <!-- Background effects -->
    <div class="bg-container"></div>
    <div class="grid-overlay"></div>
    <div class="scanline"></div>

    <!-- Main layout -->
    <div class="main-container">
        <!-- Left branding -->
        <div class="brand-section">
            <div class="brand-logo">UG</div>
            <div class="brand-tagline">UNICATE GAMING</div>
            <div class="brand-line"></div>
            <div class="brand-info">
                San Andreas Multiplayer<br>
                RPG Server<br>
                Pridruzi se zajednici
            </div>
        </div>

        <!-- Portal card - visual only -->
        <div class="portal-card">
            <!-- Welcome text -->
            <div class="welcome-text">
                <div class="player-name" id="displayName">Dobrodosao</div>
                <div class="welcome-sub" id="welcomeSub">Povezivanje na server...</div>
            </div>

            <!-- Login status -->
            <div id="loginStatus" class="status-section">
                <div class="status-icon login" id="statusIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#00b4ff" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <div class="status-title login" id="statusTitle">Prijava</div>
                <div class="status-message" id="statusMessage">
                    Unesi svoju lozinku u dialog koji se pojavio na ekranu.
                </div>
            </div>

            <!-- Registration steps -->
            <div id="registerSteps" style="display: none;">
                <div class="steps-info">
                    <div class="step-item" id="step1">
                        <span class="step-num">1</span>
                        <span>Lozinka</span>
                    </div>
                    <div class="step-item" id="step2">
                        <span class="step-num">2</span>
                        <span>Email adresa</span>
                    </div>
                    <div class="step-item" id="step3">
                        <span class="step-num">3</span>
                        <span>Godine</span>
                    </div>
                    <div class="step-item" id="step4">
                        <span class="step-num">4</span>
                        <span>Drzava</span>
                    </div>
                    <div class="step-item" id="step5">
                        <span class="step-num">5</span>
                        <span>Spol</span>
                    </div>
                </div>
            </div>

            <!-- Loading spinner -->
            <div id="spinnerSection" class="spinner-container" style="display: none;">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="spinnerText">Obrada...</div>
            </div>

            <!-- Progress dots -->
            <div class="progress-dots" id="progressDots">
                <div class="progress-dot active" id="dot1"></div>
                <div class="progress-dot" id="dot2"></div>
                <div class="progress-dot" id="dot3"></div>
            </div>
        </div>
    </div>

    <!-- Server status -->
    <div class="server-status">
        <div class="status-dot"></div>
        <span class="status-text">Server Online</span>
    </div>

    <!-- Version -->
    <div class="version-tag">v2.2</div>

    <!-- Toast notifications -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== Global State =====
        var isRegistered = false;
        var playerName = '';
        var currentStep = 0; // 0=none, 1-5=registration steps, 6=success

        // ===== Toast Notification =====
        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (type || 'info') + ' visible';
            setTimeout(function() {
                toast.classList.remove('visible');
            }, 4000);
        }

        // ===== Update Progress Dots =====
        function updateProgress(step) {
            currentStep = step;
            for (var i = 1; i <= 3; i++) {
                var dot = document.getElementById('dot' + i);
                dot.className = 'progress-dot';
                if (i <= step) dot.classList.add('done');
                if (i === step) dot.classList.add('active');
            }
        }

        // ===== Mark Registration Step =====
        function markStep(stepNum, completed) {
            var step = document.getElementById('step' + stepNum);
            if (step) {
                if (completed) {
                    step.classList.add('completed');
                } else {
                    step.classList.remove('completed');
                }
            }
        }

        // ===== Show/Hide Spinner =====
        function showSpinner(text) {
            document.getElementById('spinnerText').textContent = text || 'Obrada...';
            document.getElementById('spinnerSection').style.display = 'block';
        }

        function hideSpinner() {
            document.getElementById('spinnerSection').style.display = 'none';
        }

        // ===== CEF Event Handlers =====

        // Inicijalizacija portala - poziva se iz PAWN-a
        // CEF_EmitEvent(playerid, browserid, "portal:init", CEF_STR(playerName), CEF_INT(isRegistered))
        window.portal_init = function(pName, registered) {
            playerName = pName || '';
            isRegistered = (registered === 1 || registered === true);

            // Prikazi ime igraca
            var displayName = document.getElementById('displayName');
            if (playerName.length > 0) {
                displayName.textContent = playerName.replace(/_/g, ' ');
            }

            var statusTitle = document.getElementById('statusTitle');
            var statusMessage = document.getElementById('statusMessage');
            var statusIcon = document.getElementById('statusIcon');
            var registerSteps = document.getElementById('registerSteps');

            if (isRegistered) {
                // LOGIN - prikazi status za prijavu
                document.getElementById('welcomeSub').textContent = 'Unesi lozinku da se ulogujes';
                statusTitle.textContent = 'Prijava';
                statusTitle.className = 'status-title login';
                statusMessage.textContent = 'Unesi svoju lozinku u dialog koji se pojavio na ekranu.';
                statusIcon.className = 'status-icon login';
                statusIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#00b4ff" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
                registerSteps.style.display = 'none';
                updateProgress(1);
            } else {
                // REGISTER - prikazi korake registracije
                document.getElementById('welcomeSub').textContent = 'Popuni podatke za registraciju';
                statusTitle.textContent = 'Registracija';
                statusTitle.className = 'status-title register';
                statusMessage.textContent = 'Slijedi korake u dialogima za registraciju naloga.';
                statusIcon.className = 'status-icon register';
                statusIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>';
                registerSteps.style.display = 'block';
                updateProgress(1);
            }
        };

        // Login odgovor od servera
        window.portal_loginResponse = function(success, message) {
            if (success) {
                // Uspjesna prijava
                var statusTitle = document.getElementById('statusTitle');
                var statusMessage = document.getElementById('statusMessage');
                var statusIcon = document.getElementById('statusIcon');

                statusTitle.textContent = 'Dobrodosao!';
                statusTitle.className = 'status-title success';
                statusMessage.textContent = 'Prijava uspjesna! Uskoro ces biti spawnan...';
                statusIcon.className = 'status-icon success';
                statusIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';

                updateProgress(3);
                showToast('Prijava uspjesna! Dobrodosao natrag.', 'success');
            } else {
                showToast(message || 'Pogresna lozinka. Pokusaj ponovo.', 'error');
                updateProgress(1);
            }
        };

        // Register korak update - poziva se iz PAWN-a kada igrac predje na sljedeci korak
        window.portal_registerStep = function(step) {
            // step: 1=lozinka, 2=email, 3=godine, 4=drzava, 5=spol
            for (var i = 1; i < step; i++) {
                markStep(i, true);
            }
            markStep(step, false);

            // Update progress dots (map 5 steps to 3 dots)
            var dotStep = Math.ceil(step / 2);
            if (dotStep > 3) dotStep = 3;
            updateProgress(dotStep);

            var statusMessage = document.getElementById('statusMessage');
            var messages = {
                1: 'Unesi lozinku u dialog (min. 6 karaktera).',
                2: 'Unesi svoju email adresu.',
                3: 'Unesi svoje godine (12-70).',
                4: 'Izaberi svoju drzavu.',
                5: 'Izaberi svoj spol.'
            };
            statusMessage.textContent = messages[step] || 'Slijedi uputstva u dialogu.';
        };

        // Register odgovor od servera
        window.portal_registerResponse = function(success, message) {
            if (success) {
                var statusTitle = document.getElementById('statusTitle');
                var statusMessage = document.getElementById('statusMessage');
                var statusIcon = document.getElementById('statusIcon');

                statusTitle.textContent = 'Registracija zavrsena!';
                statusTitle.className = 'status-title success';
                statusMessage.textContent = 'Dobrodosao na UG Gaming! Uskoro ces biti spawnan...';
                statusIcon.className = 'status-icon success';
                statusIcon.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';

                // Mark all steps as completed
                for (var i = 1; i <= 5; i++) {
                    markStep(i, true);
                }
                updateProgress(3);
                showToast('Registracija uspjesna! Dobrodosao na server.', 'success');
            } else {
                showToast(message || 'Registracija nije uspjela. Pokusaj ponovo.', 'error');
            }
        };

        // Register CEF event listeners (omp-cef uses cef.on() for PAWN->JS events)
        if (typeof cef !== 'undefined' && cef.on) {
            cef.on('portal:init', function(pName, registered) {
                window.portal_init(pName, registered);
            });

            cef.on('portal:loginResponse', function(success, message) {
                window.portal_loginResponse(success, message);
            });

            cef.on('portal:registerStep', function(step) {
                window.portal_registerStep(step);
            });

            cef.on('portal:registerResponse', function(success, message) {
                window.portal_registerResponse(success, message);
            });
        }
    </script>
</body>
</html>
