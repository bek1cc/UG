<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UG Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: #0a0a12;
            color: #ffffff;
            user-select: none;
        }

        /* Animated background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 180, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 100, 200, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(3, 206, 194, 0.05) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, -1%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-0.5deg); }
        }

        /* Particle grid effect */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.03;
            background-image: 
                linear-gradient(rgba(0, 180, 255, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 180, 255, 0.5) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        /* Scan line effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
        }

        /* Main layout */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Left side - branding */
        .brand-section {
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .brand-logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 96px;
            font-weight: 700;
            letter-spacing: 12px;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 0%, #00b4ff 50%, #03cec2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            filter: drop-shadow(0 0 30px rgba(0, 180, 255, 0.3));
            margin-bottom: 12px;
        }

        .brand-tagline {
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 8px;
            text-transform: uppercase;
            color: rgba(0, 180, 255, 0.6);
            margin-left: 4px;
        }

        .brand-line {
            width: 120px;
            height: 2px;
            background: linear-gradient(90deg, #00b4ff, transparent);
            margin: 20px 0;
        }

        .brand-info {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            line-height: 1.8;
            letter-spacing: 1px;
        }

        /* Portal card */
        .portal-card {
            width: 420px;
            background: rgba(12, 14, 26, 0.85);
            border: 1px solid rgba(0, 180, 255, 0.15);
            border-radius: 16px;
            padding: 40px 36px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 
                0 0 60px rgba(0, 180, 255, 0.08),
                0 25px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .portal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00b4ff, #03cec2, transparent);
        }

        .portal-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 180, 255, 0.03), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* Tab navigation */
        .tab-nav {
            display: flex;
            gap: 0;
            margin-bottom: 32px;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .tab-btn.active {
            color: #00b4ff;
        }

        .tab-indicator {
            position: absolute;
            bottom: 0;
            height: 2px;
            background: linear-gradient(90deg, #00b4ff, #03cec2);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        /* Form styles */
        .form-container {
            position: relative;
            min-height: 280px;
        }

        .form-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .form-panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            opacity: 0.3;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-input:focus {
            border-color: rgba(0, 180, 255, 0.5);
            background: rgba(0, 180, 255, 0.04);
            box-shadow: 0 0 20px rgba(0, 180, 255, 0.1);
        }

        .form-input.error {
            border-color: rgba(239, 16, 51, 0.5);
            box-shadow: 0 0 20px rgba(239, 16, 51, 0.1);
        }

        /* Error message */
        .error-msg {
            font-size: 12px;
            color: #ef1021;
            margin-top: 6px;
            display: none;
            animation: fadeIn 0.2s ease;
        }

        .error-msg.visible {
            display: block;
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00b4ff, #0090d0);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 180, 255, 0.3);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes spin {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            gap: 16px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .divider-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Footer links */
        .portal-footer {
            text-align: center;
            margin-top: 24px;
        }

        .portal-footer a {
            color: rgba(0, 180, 255, 0.6);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .portal-footer a:hover {
            color: #00b4ff;
        }

        /* Server status */
        .server-status {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Version tag */
        .version-tag {
            position: fixed;
            bottom: 24px;
            right: 24px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 1px;
            z-index: 20;
        }

        /* Notification toast */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 13px;
            z-index: 100;
            transform: translateX(120%);
            transition: transform 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .toast.visible {
            transform: translateX(0);
        }

        .toast.error {
            background: rgba(239, 16, 51, 0.15);
            border: 1px solid rgba(239, 16, 51, 0.3);
            color: #ff6b7a;
        }

        .toast.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        /* Remember me checkbox */
        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
            margin-bottom: 4px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        .checkbox-wrapper input[type="checkbox"]:checked {
            background: #00b4ff;
            border-color: #00b4ff;
        }

        .checkbox-wrapper input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 10px;
        }

        .checkbox-wrapper span {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .forgot-link {
            font-size: 12px;
            color: rgba(0, 180, 255, 0.5);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #00b4ff;
        }

        /* Password visibility toggle */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Loading state for form */
        .form-loading {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 14, 26, 0.9);
            z-index: 50;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            border-radius: 16px;
        }

        .form-loading.visible {
            display: flex;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 180, 255, 0.2);
            border-top: 3px solid #00b4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <!-- Background effects -->
    <div class="bg-container"></div>
    <div class="grid-overlay"></div>
    <div class="scanline"></div>

    <!-- Main layout -->
    <div class="main-container">
        <!-- Left branding -->
        <div class="brand-section">
            <div class="brand-logo">UG</div>
            <div class="brand-tagline">UNICATE GAMING</div>
            <div class="brand-line"></div>
            <div class="brand-info">
                San Andreas Multiplayer<br>
                RPG Server<br>
                Pridruži se zajednici
            </div>
        </div>

        <!-- Portal card -->
        <div class="portal-card">
            <!-- Tab navigation -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">Prijava</button>
                <button class="tab-btn" data-tab="register" onclick="switchTab('register')">Registracija</button>
                <div class="tab-indicator" id="tabIndicator"></div>
            </div>

            <!-- Login form -->
            <div class="form-panel active" id="loginPanel">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Korisničko ime</label>
                        <div class="input-wrapper">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <input type="text" class="form-input" id="loginUsername" placeholder="Unesi korisničko ime" autocomplete="off" maxlength="24">
                        </div>
                        <div class="error-msg" id="loginUsernameError"></div>
                    </div>

                    <div class="form-group">
                        <label>Lozinka</label>
                        <div class="input-wrapper">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input type="password" class="form-input" id="loginPassword" placeholder="Unesi lozinku" autocomplete="off" maxlength="64">
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPassword', this)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <div class="error-msg" id="loginPasswordError"></div>
                    </div>

                    <div class="remember-row">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="rememberMe">
                            <span>Zapamti me</span>
                        </label>
                        <a href="#" class="forgot-link">Zaboravljena lozinka?</a>
                    </div>

                    <button type="submit" class="submit-btn" id="loginBtn">
                        Prijavi se
                    </button>
                </form>

                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">ili</span>
                    <div class="divider-line"></div>
                </div>

                <div class="portal-footer">
                    <a href="#" onclick="switchTab('register')">Nemaš nalog? Registruj se</a>
                </div>
            </div>

            <!-- Register form -->
            <div class="form-panel" id="registerPanel">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>Korisničko ime</label>
                        <div class="input-wrapper">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <input type="text" class="form-input" id="regUsername" placeholder="Izaberi korisničko ime" autocomplete="off" maxlength="24">
                        </div>
                        <div class="error-msg" id="regUsernameError"></div>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                            <input type="email" class="form-input" id="regEmail" placeholder="Unesi email adresu" autocomplete="off" maxlength="64">
                        </div>
                        <div class="error-msg" id="regEmailError"></div>
                    </div>

                    <div class="form-group">
                        <label>Lozinka</label>
                        <div class="input-wrapper">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input type="password" class="form-input" id="regPassword" placeholder="Izaberi lozinku" autocomplete="off" maxlength="64">
                            <button type="button" class="toggle-password" onclick="togglePasswordVisibility('regPassword', this)">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                        <div class="error-msg" id="regPasswordError"></div>
                    </div>

                    <div class="form-group">
                        <label>Potvrdi lozinku</label>
                        <div class="input-wrapper">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            </svg>
                            <input type="password" class="form-input" id="regConfirmPassword" placeholder="Ponovi lozinku" autocomplete="off" maxlength="64">
                        </div>
                        <div class="error-msg" id="regConfirmError"></div>
                    </div>

                    <button type="submit" class="submit-btn" id="registerBtn">
                        Registruj se
                    </button>
                </form>

                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">ili</span>
                    <div class="divider-line"></div>
                </div>

                <div class="portal-footer">
                    <a href="#" onclick="switchTab('login')">Već imaš nalog? Prijavi se</a>
                </div>
            </div>

            <!-- Loading overlay -->
            <div class="form-loading" id="formLoading">
                <div class="loading-spinner"></div>
                <div class="loading-text">Obrada...</div>
            </div>
        </div>
    </div>

    <!-- Server status -->
    <div class="server-status">
        <div class="status-dot"></div>
        <span class="status-text">Server Online</span>
    </div>

    <!-- Version -->
    <div class="version-tag">v2.0</div>

    <!-- Toast notifications -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== Tab Switching =====
        function switchTab(tab) {
            const loginBtn = document.querySelector('[data-tab="login"]');
            const registerBtn = document.querySelector('[data-tab="register"]');
            const loginPanel = document.getElementById('loginPanel');
            const registerPanel = document.getElementById('registerPanel');
            const indicator = document.getElementById('tabIndicator');

            // Clear errors
            clearErrors();

            if (tab === 'login') {
                loginBtn.classList.add('active');
                registerBtn.classList.remove('active');
                loginPanel.classList.add('active');
                registerPanel.classList.remove('active');
                indicator.style.left = '0';
                indicator.style.width = loginBtn.offsetWidth + 'px';
            } else {
                registerBtn.classList.add('active');
                loginBtn.classList.remove('active');
                registerPanel.classList.add('active');
                loginPanel.classList.remove('active');
                indicator.style.left = loginBtn.offsetWidth + 'px';
                indicator.style.width = registerBtn.offsetWidth + 'px';
            }
        }

        // Initialize tab indicator
        window.addEventListener('load', () => {
            const loginBtn = document.querySelector('[data-tab="login"]');
            const indicator = document.getElementById('tabIndicator');
            indicator.style.left = '0';
            indicator.style.width = loginBtn.offsetWidth + 'px';
        });

        // ===== Password Visibility Toggle =====
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>`;
            } else {
                input.type = 'password';
                btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>`;
            }
        }

        // ===== Form Validation =====
        function validateUsername(value) {
            if (!value || value.length < 3) return 'Korisničko ime mora imati najmanje 3 karaktera';
            if (value.length > 24) return 'Korisničko ime ne može biti duže od 24 karaktera';
            if (!/^[a-zA-Z0-9_]+$/.test(value)) return 'Korisničko ime može sadržati samo slova, brojeve i _';
            return null;
        }

        function validatePassword(value) {
            if (!value || value.length < 4) return 'Lozinka mora imati najmanje 4 karaktera';
            if (value.length > 64) return 'Lozinka ne može biti duža od 64 karaktera';
            return null;
        }

        function validateEmail(value) {
            if (!value || value.length === 0) return 'Email je obavezan';
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) return 'Unesi ispravnu email adresu';
            return null;
        }

        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.classList.add('visible');
            // Also add error class to input
            const input = el.previousElementSibling?.querySelector('.form-input') 
                        || el.parentElement.querySelector('.form-input');
            if (input) input.classList.add('error');
        }

        function clearErrors() {
            document.querySelectorAll('.error-msg').forEach(el => {
                el.textContent = '';
                el.classList.remove('visible');
            });
            document.querySelectorAll('.form-input').forEach(el => {
                el.classList.remove('error');
            });
        }

        // ===== Toast Notification =====
        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} visible`;
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 4000);
        }

        // ===== Set Loading State =====
        function setLoading(loading) {
            const overlay = document.getElementById('formLoading');
            if (loading) {
                overlay.classList.add('visible');
            } else {
                overlay.classList.remove('visible');
            }
        }

        // ===== Login Handler =====
        function handleLogin(e) {
            e.preventDefault();
            clearErrors();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            let hasError = false;
            const usernameErr = validateUsername(username);
            if (usernameErr) { showError('loginUsernameError', usernameErr); hasError = true; }
            const passwordErr = validatePassword(password);
            if (passwordErr) { showError('loginPasswordError', passwordErr); hasError = true; }

            if (hasError) return;

            setLoading(true);
            // omp-cef: emituj event ka PAWN-u
            if (typeof cef !== 'undefined' && cef.emit) {
                cef.emit('portal:loginAttempt', username, password);
            } else {
                console.log('[DEV] Login attempt:', username);
                setTimeout(() => { setLoading(false); showToast('Development mode', 'error'); }, 1500);
            }
        }

        // ===== Register Handler =====
        function handleRegister(e) {
            e.preventDefault();
            clearErrors();

            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            let hasError = false;
            const usernameErr = validateUsername(username);
            if (usernameErr) { showError('regUsernameError', usernameErr); hasError = true; }
            const emailErr = validateEmail(email);
            if (emailErr) { showError('regEmailError', emailErr); hasError = true; }
            const passwordErr = validatePassword(password);
            if (passwordErr) { showError('regPasswordError', passwordErr); hasError = true; }
            if (password !== confirmPassword) { showError('regConfirmError', 'Lozinke se ne podudaraju'); hasError = true; }

            if (hasError) return;

            setLoading(true);
            // omp-cef: emituj event ka PAWN-u
            if (typeof cef !== 'undefined' && cef.emit) {
                cef.emit('portal:registerAttempt', username, email, password);
            } else {
                console.log('[DEV] Register attempt:', username, email);
                setTimeout(() => { setLoading(false); showToast('Development mode', 'error'); }, 1500);
            }
        }

        // ===== CEF Event Handlers (poziva PAWN preko omp-cef emit) =====

        // Login odgovor od servera
        window.portal_loginResponse = function(success, message) {
            setLoading(false);
            if (success) {
                showToast('Prijava uspješna! Dobrodošao natrag.', 'success');
            } else {
                showToast(message || 'Pogrešno korisničko ime ili lozinka.', 'error');
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginPassword').focus();
            }
        };

        // Register odgovor od servera
        window.portal_registerResponse = function(success, message) {
            setLoading(false);
            if (success) {
                showToast('Registracija uspješna! Dobrodošao na server.', 'success');
            } else {
                showToast(message || 'Registracija nije uspjela. Pokušaj ponovo.', 'error');
            }
        };

        // Inicijalizacija portala - poziva se iz PAWN-a (portal:init event)
        window.portal_init = function(playerName, onlineCount, maxSlots, cefOk, asiOk) {
            if (playerName && playerName.length > 0) {
                document.getElementById('loginUsername').value = playerName;
                document.getElementById('regUsername').value = playerName;
            }
        };

        // Register CEF event listener for portal:init (omp-cef uses cef.on() for PAWN→JS events)
        if (typeof cef !== 'undefined' && cef.on) {
            cef.on('portal:init', function(playerName) {
                window.portal_init(playerName);
            });
        }

        // ===== Keyboard shortcuts =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Tab' && !e.shiftKey) {
                // Let default tab behavior work for form navigation
            }
        });

        // Focus first input on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loginUsername').focus();
            }, 500);
        });
    </script>
</body>
</html>
