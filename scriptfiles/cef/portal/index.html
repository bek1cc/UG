<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNICATE GAMING OGC</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@font-face {
  font-family: 'GameFont';
  src: local('Segoe UI'), local('Arial'), local('sans-serif');
}

body {
  background: #050B18;
  color: #fff;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  user-select: none;
}

/* ===== PARTICLES ===== */
canvas#particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ===== MAIN SCREEN ===== */
#main-screen {
  position: relative;
  z-index: 1;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ===== LOGO ===== */
.logo-wrap {
  position: relative;
  margin-bottom: 20px;
}
.logo-wrap img {
  width: 180px;
  height: 180px;
  object-fit: contain;
  filter: drop-shadow(0 0 30px rgba(0, 191, 255, 0.3));
  animation: logoFloat 4s ease-in-out infinite;
}
.logo-ring {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 210px; height: 210px;
  border-radius: 50%;
  border: 1px solid rgba(0, 191, 255, 0.3);
  animation: ringPulse 3s ease-in-out infinite;
}
.logo-ring2 {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 240px; height: 240px;
  border-radius: 50%;
  border: 1px solid rgba(41, 168, 255, 0.15);
  animation: ringPulse 3s ease-in-out infinite 0.5s;
}

@keyframes logoFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
@keyframes ringPulse {
  0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.03); }
}

/* ===== TITLE ===== */
.title {
  font-size: 38px;
  font-weight: 900;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #fff;
  text-shadow: 0 0 20px rgba(0, 191, 255, 0.5);
  margin-bottom: 4px;
}
.title span {
  background: linear-gradient(90deg, #00BFFF, #29A8FF, #00BFFF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  font-size: 14px;
  color: #29A8FF;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.player-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border-radius: 20px;
  background: rgba(0, 191, 255, 0.08);
  border: 1px solid rgba(0, 191, 255, 0.15);
  font-size: 12px;
  color: #00BFFF;
  margin-bottom: 30px;
}
.player-badge .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #00ff88;
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ===== PLAY BUTTON ===== */
.play-btn {
  padding: 14px 50px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #050B18;
  background: linear-gradient(135deg, #00BFFF, #29A8FF);
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 0 25px rgba(0, 191, 255, 0.3);
}
.play-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(0, 191, 255, 0.5);
}

/* ===== AUTH SCREEN ===== */
#auth-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 10;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #030810;
}
#auth-screen.active {
  display: flex;
}

/* Background grid */
#auth-screen::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(0, 191, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 191, 255, 0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}
/* Radial glow */
#auth-screen::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0, 191, 255, 0.06), transparent 70%);
  pointer-events: none;
}

/* Auth Card */
.auth-card {
  position: relative;
  width: 380px;
  max-width: 90%;
  background: rgba(6, 20, 40, 0.9);
  border: 1px solid rgba(0, 191, 255, 0.12);
  border-radius: 16px;
  overflow: hidden;
  z-index: 1;
}
.auth-card .top-line {
  height: 2px;
  background: linear-gradient(90deg, transparent, #00BFFF, transparent);
}

.auth-inner {
  padding: 30px 28px;
}

.auth-logo {
  display: block;
  margin: 0 auto 16px;
  width: 50px; height: 50px;
  object-fit: contain;
  filter: drop-shadow(0 0 10px rgba(0, 191, 255, 0.3));
}

.auth-title {
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.auth-name {
  text-align: center;
  margin-bottom: 20px;
}
.auth-name span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 12px;
  border-radius: 15px;
  background: rgba(0, 191, 255, 0.08);
  border: 1px solid rgba(0, 191, 255, 0.15);
  font-size: 11px;
  color: #00BFFF;
}

/* Tab toggle */
.tab-toggle {
  display: flex;
  gap: 4px;
  padding: 4px;
  border-radius: 10px;
  background: rgba(0, 191, 255, 0.04);
  border: 1px solid rgba(0, 191, 255, 0.08);
  margin-bottom: 20px;
}
.tab-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  color: #8899aa;
  background: transparent;
  cursor: pointer;
  transition: all 0.3s;
}
.tab-btn.active {
  color: #050B18;
  background: linear-gradient(135deg, #00BFFF, #29A8FF);
}

/* Status */
.status-msg {
  text-align: center;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 14px;
  display: none;
}
.status-msg.success {
  display: block;
  background: rgba(0, 255, 136, 0.1);
  color: #00ff88;
  border: 1px solid rgba(0, 255, 136, 0.2);
}
.status-msg.error {
  display: block;
  background: rgba(255, 68, 68, 0.1);
  color: #ff6666;
  border: 1px solid rgba(255, 68, 68, 0.2);
}

/* Form */
.form-group {
  margin-bottom: 12px;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border-radius: 10px;
  background: rgba(0, 191, 255, 0.04);
  border: 1px solid rgba(0, 191, 255, 0.1);
  color: #fff;
  font-size: 13px;
  outline: none;
  transition: border 0.3s;
}
.form-group input:focus, .form-group select:focus {
  border-color: rgba(0, 191, 255, 0.4);
}
.form-group input::placeholder {
  color: rgba(136, 153, 170, 0.5);
}
.form-group select option {
  background: #0A1930;
  color: #fff;
}

/* Icon prefix */
.form-group {
  position: relative;
}
.form-group .ico {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: #8899aa;
  pointer-events: none;
}

/* Submit */
.submit-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #050B18;
  background: linear-gradient(135deg, #00BFFF, #29A8FF);
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 4px;
}
.submit-btn:hover {
  box-shadow: 0 0 25px rgba(0, 191, 255, 0.4);
}
.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Switch link */
.switch-link {
  text-align: center;
  margin-top: 16px;
  font-size: 11px;
  color: #8899aa;
}
.switch-link a {
  color: #00BFFF;
  cursor: pointer;
  text-decoration: none;
}
.switch-link a:hover {
  color: #fff;
}

/* Hide sections */
.form-section { display: none; }
.form-section.active { display: block; }

/* Bottom text */
.bottom-text {
  position: absolute;
  bottom: 16px;
  left: 0; right: 0;
  text-align: center;
  font-size: 9px;
  color: rgba(136, 153, 170, 0.3);
  letter-spacing: 2px;
  z-index: 1;
}

/* Password toggle */
.pw-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #8899aa;
  cursor: pointer;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
}
.pw-toggle:hover { color: #fff; }
</style>
</head>
<body>

<!-- Particles -->
<canvas id="particles"></canvas>

<!-- ===== MAIN SCREEN ===== -->
<div id="main-screen">
  <div class="logo-wrap">
    <div class="logo-ring"></div>
    <div class="logo-ring2"></div>
    <img src="./logo.png" alt="UG" />
  </div>
  <div class="title">UNICATE <span>GAMING OGC</span></div>
  <div class="subtitle">Premium Balkan Roleplay</div>
  <div class="player-badge">
    <span class="dot"></span>
    <span id="player-name-text">Server Online</span>
  </div>
  <button class="play-btn" onclick="onPlayClick()">IGRAJ SADA</button>
</div>

<!-- ===== AUTH SCREEN ===== -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="top-line"></div>
    <div class="auth-inner">
      <img class="auth-logo" src="./logo.png" alt="UG" />
      <div class="auth-title" id="auth-title">DOBRODOŠAO NATRAG</div>
      <div class="auth-name"><span>&#9737; <span id="auth-player-name">Igrač</span></span></div>

      <div class="tab-toggle">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Prijava</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Registracija</button>
      </div>

      <div class="status-msg" id="status-msg"></div>

      <!-- LOGIN FORM -->
      <div class="form-section active" id="login-form">
        <div class="form-group">
          <span class="ico">&#128274;</span>
          <input type="password" id="login-pass" placeholder="Lozinka" />
          <span class="pw-toggle" onclick="togglePw('login-pass')">Pokaži</span>
        </div>
        <button class="submit-btn" onclick="doLogin()">PRIJAVI SE</button>
      </div>

      <!-- REGISTER FORM -->
      <div class="form-section" id="register-form">
        <div class="form-group">
          <span class="ico">&#128274;</span>
          <input type="password" id="reg-pass" placeholder="Lozinka (min. 6)" />
          <span class="pw-toggle" onclick="togglePw('reg-pass')">Pokaži</span>
        </div>
        <div class="form-group">
          <span class="ico">&#9993;</span>
          <input type="text" id="reg-email" placeholder="Email adresa" />
        </div>
        <div class="form-group">
          <span class="ico">&#127874;</span>
          <input type="number" id="reg-age" placeholder="Godine (12-70)" min="12" max="70" />
        </div>
        <div class="form-group">
          <span class="ico">&#127758;</span>
          <select id="reg-country">
            <option value="">Država</option>
            <option value="1">Srbija</option>
            <option value="2">Hrvatska</option>
            <option value="3">Bosna i Hercegovina</option>
            <option value="4">Crna Gora</option>
            <option value="5">Makedonija</option>
            <option value="6">Ostalo</option>
          </select>
        </div>
        <div class="form-group">
          <span class="ico">&#128100;</span>
          <select id="reg-gender">
            <option value="">Spol</option>
            <option value="1">Muški</option>
            <option value="2">Ženski</option>
          </select>
        </div>
        <button class="submit-btn" onclick="doRegister()">REGISTRIRAJ SE</button>
      </div>

      <div class="switch-link">
        <span id="switch-text">Nemaš račun?</span>
        <a id="switch-link" onclick="toggleMode()">Registriraj se</a>
      </div>
    </div>
  </div>
  <div class="bottom-text">UNICATE GAMING OGC &bull; PREMIUM ROLEPLAY</div>
</div>

<script>
// ===== STATE =====
var isRegistered = false;
var playerName = 'Igrač';
var currentMode = 'login'; // 'login' or 'register'

// ===== PARTICLES =====
(function() {
  var c = document.getElementById('particles');
  var ctx = c.getContext('2d');
  var pts = [];
  var count = 40;

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < count; i++) {
    pts.push({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 1.5 + 0.5
    });
  }

  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    for (var i = 0; i < pts.length; i++) {
      var p = pts[i];
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > c.width) p.vx *= -1;
      if (p.y < 0 || p.y > c.height) p.vy *= -1;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0, 191, 255, 0.4)';
      ctx.fill();

      for (var j = i + 1; j < pts.length; j++) {
        var q = pts[j];
        var dx = p.x - q.x, dy = p.y - q.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = 'rgba(0, 191, 255, ' + (0.15 * (1 - dist / 120)) + ')';
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ===== CEF EVENTS =====
// Listen for portal:init from Pawn
if (typeof cef !== 'undefined' && cef.addEventListener) {
  cef.addEventListener('portal:init', function(name, registered) {
    playerName = name || 'Igrač';
    isRegistered = (registered == 1);
    document.getElementById('player-name-text').textContent = playerName;
    document.getElementById('auth-player-name').textContent = playerName;
    if (isRegistered) {
      switchTab('login');
    } else {
      switchTab('register');
    }
    console.log('[PORTAL] init: ' + name + ' registered=' + registered);
  });

  cef.addEventListener('portal:loginResponse', function(success, msg) {
    showStatus(success ? 'success' : 'error', msg || (success ? 'Prijava uspješna!' : 'Pogrešna lozinka!'));
    if (success) {
      document.getElementById('login-pass').disabled = true;
    } else {
      document.getElementById('login-pass').value = '';
    }
    document.getElementById('login-pass').disabled = false;
  });

  cef.addEventListener('portal:registerResponse', function(success, msg) {
    showStatus(success ? 'success' : 'error', msg || (success ? 'Registracija uspješna!' : 'Greška!'));
    if (!success) {
      document.getElementById('reg-pass').value = '';
    }
  });
}

// ===== FUNCTIONS =====
function onPlayClick() {
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('auth-screen').classList.add('active');

  // Set mode based on registration status
  if (isRegistered) {
    switchTab('login');
  } else {
    switchTab('register');
  }

  // Focus password input
  setTimeout(function() {
    var el = isRegistered ? document.getElementById('login-pass') : document.getElementById('reg-pass');
    if (el) el.focus();
  }, 200);
}

function switchTab(mode) {
  currentMode = mode;
  var loginBtn = document.getElementById('tab-login');
  var regBtn = document.getElementById('tab-register');
  var loginForm = document.getElementById('login-form');
  var regForm = document.getElementById('register-form');
  var title = document.getElementById('auth-title');
  var switchText = document.getElementById('switch-text');
  var switchLink = document.getElementById('switch-link');

  if (mode === 'login') {
    loginBtn.classList.add('active');
    regBtn.classList.remove('active');
    loginForm.classList.add('active');
    regForm.classList.remove('active');
    title.textContent = 'DOBRODOŠAO NATRAG';
    switchText.textContent = 'Nemaš račun? ';
    switchLink.textContent = 'Registriraj se';
  } else {
    regBtn.classList.add('active');
    loginBtn.classList.remove('active');
    regForm.classList.add('active');
    loginForm.classList.remove('active');
    title.textContent = 'KREIRAJ RAČUN';
    switchText.textContent = 'Imaš račun? ';
    switchLink.textContent = 'Prijavi se';
  }
  hideStatus();
}

function toggleMode() {
  switchTab(currentMode === 'login' ? 'register' : 'login');
}

function showStatus(type, msg) {
  var el = document.getElementById('status-msg');
  el.className = 'status-msg ' + type;
  el.textContent = msg;
}
function hideStatus() {
  var el = document.getElementById('status-msg');
  el.className = 'status-msg';
}

function togglePw(id) {
  var el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

function doLogin() {
  var pass = document.getElementById('login-pass').value;
  if (!pass || pass.length < 1) {
    showStatus('error', 'Unesi lozinku!');
    return;
  }
  showStatus('success', 'Provjera...');
  document.getElementById('login-pass').disabled = true;

  if (typeof cef !== 'undefined' && cef.emit) {
    cef.emit('portal:requestLogin', pass);
  } else {
    // Dev mode
    setTimeout(function() {
      showStatus('success', 'Prijava uspješna! (dev)');
      document.getElementById('login-pass').disabled = false;
    }, 1000);
  }
}

function doRegister() {
  var pass = document.getElementById('reg-pass').value;
  var email = document.getElementById('reg-email').value;
  var age = parseInt(document.getElementById('reg-age').value);
  var country = parseInt(document.getElementById('reg-country').value);
  var gender = parseInt(document.getElementById('reg-gender').value);

  if (!pass || pass.length < 6) { showStatus('error', 'Lozinka mora imati najmanje 6 karaktera!'); return; }
  if (!email || email.length < 5) { showStatus('error', 'Unesi ispravan email!'); return; }
  if (!age || age < 12 || age > 70) { showStatus('error', 'Godine moraju biti između 12 i 70!'); return; }
  if (!country) { showStatus('error', 'Odaberi državu!'); return; }
  if (!gender) { showStatus('error', 'Odaberi spol!'); return; }

  showStatus('success', 'Provjera...');

  if (typeof cef !== 'undefined' && cef.emit) {
    cef.emit('portal:requestRegister', pass, email, age, country, gender);
  } else {
    setTimeout(function() {
      showStatus('success', 'Registracija uspješna! (dev)');
    }, 1000);
  }
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    if (currentMode === 'login') doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
