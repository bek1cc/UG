# SA-MP 0.3.DL Server Configuration - Unicate Gaming RPG
echo Executing Server Config...
lanmode 0
rcon_password russss
maxplayers 200
port 7777
hostname Unicate Gaming RPG
gamemode0 fg-ogc 1

# Plugins - SA-MP 0.3.DL Windows
# REDOSLIJED JE BITAN! crashdetect mora biti prvi, mysql zadnji
# CEF plugin je UKLONJEN - koristimo dl_compat no-op fallback (CEF browseri ne rade,
# ali server se ne crasha). Ako dodas CEF server plugin za 0.3.DL, dodaj "cef" u listu
# i definisi CEF_PLUGIN u gamemodes/fg-ogc.pwn prije include-a
plugins crashdetect streamer sscanf iTD MapAndreas mysql

# MySQL: mysql.dll treba libmysql.dll u ISTOM folderu kao samp-server.exe
# Preuzmi libmysql.dll sa: https://github.com/peters1v/SA-MP-mysql-plugin/raw/master/libmysql.dll
# ili iz MySQL Connector/C 6.1 instalacije

# SA-MP 0.3.DL custom model settings
# artwork_path - folder sa custom modelima (DFF/TXD fajlovi)
# models_path - relativna putanja unutar artwork_path
artwork_path models

announce 1
query 1
chatlogging 1
weburl www.ug-rpg.com
mapname UGRPG
