<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG Case Opening</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020408;color:#fff;font-family:'Rajdhani',sans-serif;overflow:hidden;width:100vw;height:100vh;user-select:none}

/* ===== SUBTLE TINT OVERLAY ===== */
.purple-tint{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at 50% 40%,rgba(88,28,135,0.06) 0%,rgba(67,20,120,0.03) 40%,transparent 70%);
  animation:tintPulse 6s ease-in-out infinite}
@keyframes tintPulse{0%,100%{opacity:0.5}50%{opacity:0.8}}

/* ===== CANVAS LAYERS ===== */
canvas#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
canvas#confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;pointer-events:none}

/* ===== VIGNETTE ===== */
.vignette{position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 20%,rgba(10,2,20,0.7) 70%,rgba(5,0,15,0.95) 100%)}

/* ===== MAIN CONTAINER ===== */
#case-container{position:relative;z-index:5;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ===== LOGO ===== */
.ug-logo{position:absolute;top:24px;left:28px;z-index:10;opacity:0;animation:fadeIn 0.8s 0.3s forwards}
.ug-logo img{width:48px;height:48px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(139,92,246,0.6))}

/* ===== CASE TITLE ===== */
.case-title{position:absolute;top:32px;left:0;right:0;text-align:center;z-index:10;opacity:0;animation:fadeIn 0.6s 0.5s forwards}
.case-title h2{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  background:linear-gradient(135deg,#c4b5fd,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 8px rgba(139,92,246,0.5))}
.case-title .case-type{font-size:11px;letter-spacing:2px;color:rgba(196,181,253,0.35);margin-top:4px}

/* ===== 3D BOX ===== */
.box-scene{perspective:900px;width:260px;height:260px;margin-bottom:40px;opacity:0;transition:opacity 0.5s}
.box-scene.visible{opacity:1}

.box-3d{width:100%;height:100%;position:relative;transform-style:preserve-3d;
  transform:rotateX(-15deg) rotateY(0deg);transition:transform 0.05s linear}

.box-face{position:absolute;width:260px;height:260px;
  background:linear-gradient(135deg,#0a0a1a,#1a1040);
  border:1px solid rgba(139,92,246,0.25);backface-visibility:visible}

.box-face::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(139,92,246,0.08),transparent 60%);pointer-events:none}

.box-face::after{content:'';position:absolute;inset:8px;border:1px solid rgba(139,92,246,0.1);pointer-events:none}

.box-front{transform:translateZ(130px)}
.box-back{transform:rotateY(180deg) translateZ(130px)}
.box-left{transform:rotateY(-90deg) translateZ(130px)}
.box-right{transform:rotateY(90deg) translateZ(130px)}
.box-top{transform:rotateX(90deg) translateZ(130px);
  background:linear-gradient(135deg,#1a1040,#251660);
  border:1px solid rgba(139,92,246,0.35);transform-origin:top center}
.box-bottom{transform:rotateX(-90deg) translateZ(130px)}

/* Box face emblem */
.box-emblem{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.box-emblem img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(139,92,246,0.5));opacity:0.8}
.box-emblem-text{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:3px;color:rgba(139,92,246,0.5);margin-top:8px;text-transform:uppercase}

/* Box glow ring */
.box-glow{position:absolute;top:50%;left:50%;width:320px;height:320px;transform:translate(-50%,-50%);
  border-radius:50%;pointer-events:none;opacity:0;transition:opacity 0.5s;
  background:radial-gradient(circle,rgba(139,92,246,0.2) 0%,rgba(88,28,135,0.08) 40%,transparent 70%)}
.box-glow.active{opacity:1;animation:glowPulse 1.5s ease-in-out infinite}

/* Box floor reflection */
.box-floor{position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);width:340px;height:60px;
  background:radial-gradient(ellipse,rgba(139,92,246,0.15) 0%,rgba(88,28,135,0.05) 50%,transparent 70%);pointer-events:none}

/* ===== OPENING BUTTON ===== */
.open-btn{position:relative;padding:16px 56px;border:none;border-radius:14px;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:#fff;cursor:pointer;z-index:10;
  background:linear-gradient(135deg,rgba(139,92,246,0.7),rgba(109,40,217,0.9));
  box-shadow:0 0 30px rgba(139,92,246,0.3),0 0 60px rgba(139,92,246,0.1),inset 0 1px 0 rgba(255,255,255,0.1);
  transition:all 0.3s;opacity:0;animation:fadeIn 0.6s 1.2s forwards}
.open-btn:hover{transform:scale(1.06);
  box-shadow:0 0 60px rgba(139,92,246,0.5),0 0 120px rgba(139,92,246,0.2),0 0 200px rgba(139,92,246,0.08);
  background:linear-gradient(135deg,rgba(139,92,246,0.9),rgba(109,40,217,1))}
.open-btn:active{transform:scale(0.98)}
.open-btn.hidden{display:none}
.open-btn::before{content:'';position:absolute;inset:-2px;border-radius:16px;
  background:linear-gradient(135deg,#8b5cf6,#06b6d4,#8b5cf6);z-index:-1;opacity:0.5;filter:blur(8px);transition:opacity 0.3s}
.open-btn:hover::before{opacity:0.8}

/* ===== PROGRESS BAR ===== */
.progress-wrap{width:300px;height:4px;border-radius:4px;background:rgba(139,92,246,0.1);margin-top:24px;
  overflow:hidden;opacity:0;transition:opacity 0.3s}
.progress-wrap.visible{opacity:1}
.progress-bar{width:0%;height:100%;border-radius:4px;
  background:linear-gradient(90deg,#8b5cf6,#a855f7,#06b6d4);transition:width 0.1s linear}

/* ===== REWARD SCREEN ===== */
#reward-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:15;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(2,4,8,0.95);backdrop-filter:blur(8px)}
#reward-screen.active{display:flex}

/* Purple atmospheric glow orbs */
.reward-atmosphere{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:800px;pointer-events:none}
.atmo-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:orbFloat 6s ease-in-out infinite}
.atmo-orb.orb1{width:300px;height:300px;top:10%;left:20%;background:rgba(139,92,246,0.12);animation-delay:0s}
.atmo-orb.orb2{width:250px;height:250px;top:50%;right:10%;background:rgba(88,28,135,0.1);animation-delay:-2s}
.atmo-orb.orb3{width:200px;height:200px;bottom:20%;left:30%;background:rgba(139,92,246,0.08);animation-delay:-4s}
.atmo-orb.orb4{width:350px;height:350px;top:30%;left:45%;background:rgba(109,40,217,0.15);animation-delay:-1s}

/* Glowing rings behind car */
.glow-rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);pointer-events:none;z-index:0}
.glow-ring{position:absolute;border-radius:50%;border:2px solid rgba(139,92,246,0.15);
  top:50%;left:50%;transform:translate(-50%,-50%);animation:ringPulse 3s ease-in-out infinite}
.glow-ring.ring1{width:200px;height:200px;border-color:rgba(139,92,246,0.25);animation-delay:0s}
.glow-ring.ring2{width:300px;height:300px;border-color:rgba(139,92,246,0.15);animation-delay:-0.5s}
.glow-ring.ring3{width:420px;height:420px;border-color:rgba(88,28,135,0.1);animation-delay:-1s}
.glow-ring.ring4{width:550px;height:550px;border-color:rgba(139,92,246,0.06);animation-delay:-1.5s}

/* Center radial glow */
.center-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:500px;height:500px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(139,92,246,0.15) 0%,rgba(88,28,135,0.05) 30%,transparent 70%);
  animation:centerGlowPulse 2.5s ease-in-out infinite}

/* ===== REWARD CARD ===== */
.reward-card{position:relative;width:420px;max-width:92%;background:rgba(18,14,40,0.93);
  border:1px solid rgba(167,139,250,0.25);border-radius:24px;overflow:hidden;
  transform:scale(0.7) translateY(40px);opacity:0;transition:all 0.7s cubic-bezier(0.16,1,0.3,1);
  z-index:1}
.reward-card.show{transform:scale(1) translateY(0);opacity:1}

.reward-card .top-line{height:3px;background:linear-gradient(90deg,transparent,rgba(167,139,250,0.9),rgba(34,211,238,0.6),rgba(167,139,250,0.9),transparent)}
.reward-card .card-shine{position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(139,92,246,0.06),transparent);
  animation:cardShine 4s ease-in-out infinite}

/* Card outer glow - INSANE hover effect */
.reward-card::before{content:'';position:absolute;inset:-3px;border-radius:26px;
  background:linear-gradient(135deg,rgba(167,139,250,0.45),rgba(34,211,238,0.2),rgba(168,85,247,0.15),rgba(167,139,250,0.45));
  z-index:-2;opacity:0;filter:blur(16px);transition:opacity 0.5s,filter 0.5s}
.reward-card:hover::before{opacity:1;filter:blur(20px)}

.reward-card::after{content:'';position:absolute;inset:-1px;border-radius:25px;
  background:linear-gradient(135deg,rgba(167,139,250,0.55),rgba(34,211,238,0.3),rgba(168,85,247,0.2),rgba(167,139,250,0.55));
  z-index:-1;opacity:0;filter:blur(10px);transition:opacity 0.4s,filter 0.4s}
.reward-card:hover::after{opacity:1;filter:blur(14px)}

.reward-card:hover{border-color:rgba(167,139,250,0.5);
  box-shadow:0 0 40px rgba(167,139,250,0.25),0 0 80px rgba(139,92,246,0.12),0 0 120px rgba(34,211,238,0.06)}

.reward-inner{padding:28px 24px 24px;text-align:center;position:relative;z-index:1}

/* Rarity badge */
.reward-rarity{display:inline-block;padding:5px 18px;border-radius:20px;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;
  background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.25);color:#a78bfa;
  transition:all 0.3s}
.reward-rarity:hover{box-shadow:0 0 25px rgba(139,92,246,0.4);transform:scale(1.05)}
.reward-rarity.legendary{background:linear-gradient(135deg,rgba(255,170,0,0.15),rgba(255,100,0,0.08));border-color:rgba(255,170,0,0.4);color:#fbbf24;
  box-shadow:0 0 20px rgba(255,170,0,0.2)}
.reward-rarity.legendary:hover{box-shadow:0 0 40px rgba(255,170,0,0.4)}
.reward-rarity.epic{background:linear-gradient(135deg,rgba(168,85,247,0.18),rgba(139,92,246,0.1));border-color:rgba(168,85,247,0.4);color:#c084fc;
  box-shadow:0 0 20px rgba(168,85,247,0.2)}
.reward-rarity.epic:hover{box-shadow:0 0 35px rgba(168,85,247,0.4)}
.reward-rarity.rare{background:rgba(6,182,212,0.14);border-color:rgba(6,182,212,0.3);color:#22d3ee;
  box-shadow:0 0 15px rgba(6,182,212,0.15)}
.reward-rarity.rare:hover{box-shadow:0 0 30px rgba(6,182,212,0.35)}
.reward-rarity.common{background:rgba(100,200,100,0.12);border-color:rgba(100,200,100,0.25);color:#86efac;
  box-shadow:0 0 12px rgba(100,200,100,0.1)}
.reward-rarity.common:hover{box-shadow:0 0 25px rgba(100,200,100,0.25)}

/* ===== CAR IMAGE AREA ===== */
.reward-vehicle-img{width:100%;height:200px;margin:0 auto 16px;position:relative;
  display:flex;align-items:center;justify-content:center;overflow:visible}
.reward-vehicle-img img{max-width:92%;max-height:180px;object-fit:contain;position:relative;z-index:2;
  filter:drop-shadow(0 0 30px rgba(139,92,246,0.6)) drop-shadow(0 4px 20px rgba(0,0,0,0.8));
  transition:all 0.5s cubic-bezier(0.16,1,0.3,1)}
.reward-card:hover .reward-vehicle-img img{filter:drop-shadow(0 0 50px rgba(139,92,246,0.8)) drop-shadow(0 0 80px rgba(88,28,135,0.3)) drop-shadow(0 4px 30px rgba(0,0,0,0.8));
  transform:scale(1.04) translateY(-4px)}

/* Car image glow behind - enhanced purple */
.car-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:300px;height:200px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(139,92,246,0.25) 0%,rgba(88,28,135,0.1) 30%,rgba(6,182,212,0.05) 50%,transparent 70%);
  pointer-events:none;z-index:1;animation:carGlowPulse 2s ease-in-out infinite;
  transition:all 0.5s}
.reward-card:hover .car-glow{width:350px;height:240px;
  background:radial-gradient(ellipse,rgba(139,92,246,0.35) 0%,rgba(88,28,135,0.15) 30%,rgba(6,182,212,0.06) 50%,transparent 70%)}

/* Car floor reflection */
.car-floor{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:260px;height:35px;
  background:radial-gradient(ellipse,rgba(139,92,246,0.18) 0%,rgba(88,28,135,0.05) 50%,transparent 70%);pointer-events:none;z-index:0;
  transition:all 0.5s}
.reward-card:hover .car-floor{width:300px;
  background:radial-gradient(ellipse,rgba(139,92,246,0.25) 0%,rgba(88,28,135,0.08) 50%,transparent 70%)}

.reward-name{font-family:'Orbitron',monospace;font-size:26px;font-weight:900;letter-spacing:3px;
  background:linear-gradient(135deg,#f0e8ff,#e0d4ff,#67e8f9,#e0d4ff,#f0e8ff);
  background-size:200% 200%;animation:nameShimmer 3s ease-in-out infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
@keyframes nameShimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.reward-subtitle{font-size:12px;color:rgba(196,181,253,0.45);letter-spacing:2px;margin-bottom:20px;font-family:'Rajdhani',sans-serif;font-weight:500}

.reward-congrats{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:rgba(196,181,253,0.85);margin-bottom:22px;
  opacity:0;animation:fadeIn 0.5s 0.8s forwards}

/* Stats */
.reward-stats{display:flex;gap:10px;justify-content:center;margin-bottom:22px}
.reward-stat{text-align:center;padding:10px 14px;border-radius:12px;
  background:rgba(139,92,246,0.05);border:1px solid rgba(139,92,246,0.12);min-width:75px;
  transition:all 0.3s;cursor:default;position:relative;overflow:hidden}
.reward-stat::before{content:'';position:absolute;inset:0;border-radius:12px;
  background:radial-gradient(circle at 50% 50%,rgba(139,92,246,0.08),transparent 70%);opacity:0;transition:opacity 0.3s}
.reward-stat:hover::before{opacity:1}
.reward-stat:hover{background:rgba(139,92,246,0.12);border-color:rgba(139,92,246,0.3);
  box-shadow:0 0 25px rgba(139,92,246,0.15),0 0 50px rgba(139,92,246,0.05);transform:translateY(-3px)}
.reward-stat .val{font-family:'Orbitron',monospace;font-size:16px;font-weight:700;color:#c4b5fd}
.reward-stat .lbl{font-family:'Orbitron',monospace;font-size:8px;color:rgba(255,255,255,0.3);letter-spacing:1.5px;margin-top:3px;text-transform:uppercase}

/* Pick up / close button */
.close-btn{padding:12px 44px;border:none;border-radius:12px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:#fff;cursor:pointer;transition:all 0.3s;
  background:linear-gradient(135deg,rgba(139,92,246,0.6),rgba(109,40,217,0.8));
  box-shadow:0 0 25px rgba(139,92,246,0.25),inset 0 1px 0 rgba(255,255,255,0.08);
  opacity:0;animation:fadeIn 0.5s 1.2s forwards;position:relative;overflow:hidden}
.close-btn::after{content:'';position:absolute;inset:0;border-radius:12px;
  background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent);opacity:0;transition:opacity 0.3s}
.close-btn:hover::after{opacity:1}
.close-btn:hover{transform:scale(1.05);
  box-shadow:0 0 50px rgba(139,92,246,0.4),0 0 100px rgba(139,92,246,0.15),0 0 150px rgba(88,28,135,0.08);
  background:linear-gradient(135deg,rgba(139,92,246,0.85),rgba(109,40,217,1))}
.close-btn:active{transform:scale(0.97)}

/* ESC hint */
.esc-hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:10px;
  color:rgba(196,181,253,0.15);letter-spacing:1px;font-family:'Rajdhani',sans-serif}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes glowPulse{0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}
@keyframes centerGlowPulse{0%,100%{opacity:0.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.8;transform:translate(-50%,-50%) scale(1.1)}}
@keyframes ringPulse{0%,100%{opacity:0.3;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.7;transform:translate(-50%,-50%) scale(1.05)}}
@keyframes carGlowPulse{0%,100%{opacity:0.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}33%{transform:translateY(-20px) scale(1.05)}66%{transform:translateY(10px) scale(0.95)}}
@keyframes cardShine{0%{left:-100%}50%{left:100%}100%{left:100%}}
@keyframes shakeBox{0%,100%{transform:translateX(0)}10%{transform:translateX(-6px) rotate(-1deg)}20%{transform:translateX(6px) rotate(1deg)}30%{transform:translateX(-5px) rotate(-0.5deg)}40%{transform:translateX(5px) rotate(0.5deg)}50%{transform:translateX(-4px)}60%{transform:translateX(4px)}70%{transform:translateX(-2px)}80%{transform:translateX(2px)}90%{transform:translateX(-1px)}}
@keyframes boxLidOpen{0%{transform:rotateX(90deg) translateZ(130px)}100%{transform:rotateX(170deg) translateZ(130px)}}
@keyframes flashScreen{0%{opacity:0}50%{opacity:0.3}100%{opacity:0}}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(1.1);opacity:0}}

.screen-flash{position:fixed;top:0;left:0;width:100%;height:100%;z-index:14;pointer-events:none;
  background:rgba(139,92,246,0.3);opacity:0}
.screen-flash.flash{animation:flashScreen 0.4s ease-out}

/* Light rays behind box */
.light-rays{position:absolute;top:50%;left:50%;width:400px;height:400px;transform:translate(-50%,-50%);
  pointer-events:none;opacity:0;transition:opacity 0.5s}
.light-rays.active{opacity:1}
.light-ray{position:absolute;top:50%;left:50%;width:2px;height:200px;transform-origin:bottom center;
  background:linear-gradient(to top,rgba(139,92,246,0.25),transparent);border-radius:2px}

/* Panel entrance animation */
.reward-card{animation:cardEntrance 0.7s cubic-bezier(0.16,1,0.3,1)}
@keyframes cardEntrance{from{transform:scale(0.7) translateY(40px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>
<div class="purple-tint"></div>
<div class="vignette"></div>
<div class="screen-flash" id="screen-flash"></div>

<div id="case-container">
  <!-- Logo -->
  <div class="ug-logo"><img src="./logo.png" alt="UG" onerror="this.style.display='none'" /></div>

  <!-- Title -->
  <div class="case-title">
    <h2>Premium Case</h2>
    <div class="case-type">Unicate Gaming OGC</div>
  </div>

  <!-- 3D Box -->
  <div class="box-scene" id="box-scene">
    <div class="box-glow" id="box-glow"></div>
    <div class="light-rays" id="light-rays"></div>
    <div class="box-3d" id="box-3d">
      <div class="box-face box-front">
        <div class="box-emblem">
          <img src="./logo.png" alt="UG" onerror="this.style.display='none'" />
          <div class="box-emblem-text">Premium</div>
        </div>
      </div>
      <div class="box-face box-back">
        <div class="box-emblem">
          <img src="./logo.png" alt="UG" onerror="this.style.display='none'" />
          <div class="box-emblem-text">Premium</div>
        </div>
      </div>
      <div class="box-face box-left"></div>
      <div class="box-face box-right"></div>
      <div class="box-face box-top" id="box-lid"></div>
      <div class="box-face box-bottom"></div>
    </div>
    <div class="box-floor"></div>
  </div>

  <!-- Open Button -->
  <button class="open-btn" id="open-btn" onclick="startOpening()">OTVORI KUTIJU</button>

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
  </div>
</div>

<!-- Reward Screen -->
<div id="reward-screen">
  <!-- Atmospheric orbs -->
  <div class="reward-atmosphere">
    <div class="atmo-orb orb1"></div>
    <div class="atmo-orb orb2"></div>
    <div class="atmo-orb orb3"></div>
    <div class="atmo-orb orb4"></div>
  </div>

  <!-- Center glow -->
  <div class="center-glow"></div>

  <!-- Glowing rings -->
  <div class="glow-rings">
    <div class="glow-ring ring1"></div>
    <div class="glow-ring ring2"></div>
    <div class="glow-ring ring3"></div>
    <div class="glow-ring ring4"></div>
  </div>

  <!-- Reward Card -->
  <div class="reward-card" id="reward-card">
    <div class="top-line"></div>
    <div class="card-shine"></div>
    <div class="reward-inner">
      <div class="reward-rarity legendary" id="reward-rarity">LEGENDARY</div>
      <div class="reward-vehicle-img">
        <div class="car-glow" id="car-glow"></div>
        <div class="car-floor"></div>
        <img id="car-image" src="./elegy.png" alt="Vehicle" onerror="this.style.display='none'" />
      </div>
      <div class="reward-name" id="reward-name">Elegy</div>
      <div class="reward-subtitle" id="reward-subtitle">Sportsko vozilo</div>
      <div class="reward-congrats" id="reward-congrats">Cestitamo! Osvojili ste Elegy</div>
      <div class="reward-stats">
        <div class="reward-stat">
          <div class="val" id="stat-speed">8.4</div>
          <div class="lbl">Brzina</div>
        </div>
        <div class="reward-stat">
          <div class="val" id="stat-accel">7.2</div>
          <div class="lbl">Ubrzanje</div>
        </div>
        <div class="reward-stat">
          <div class="val" id="stat-handling">9.1</div>
          <div class="lbl">Vozljivost</div>
        </div>
      </div>
      <button class="close-btn" onclick="closeCase()">POKUPI</button>
    </div>
  </div>
  <div class="esc-hint">Pritisni ESC ili klikni POKUPI da zatvoris</div>
</div>

<script>
// ===== STATE =====
var isAnimating = false;
var rewardData = { name: 'Elegy', type: 'vehicle', rarity: 'legendary', label: 'Sportsko vozilo', speed: '8.4', accel: '7.2', handling: '9.1' };

// Vehicle images map
var vehicleImages = {
  'Elegy': './elegy.png',
  'elegy': './elegy.png',
  'Sultan': './elegy.png',
  'sultan': './elegy.png',
  'default': './elegy.png'
};

// ===== SOUND ENGINE (Web Audio API - no files needed) =====
var audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

function playSound(type) {
  var ctx = getAudioCtx();
  if (!ctx) return;
  var now = ctx.currentTime;

  if (type === 'open') {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, now);
    osc.frequency.exponentialRampToValueAtTime(800, now + 0.8);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 1.0);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 1.0);

    var osc2 = ctx.createOscillator();
    var gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(80, now);
    osc2.frequency.exponentialRampToValueAtTime(40, now + 0.6);
    gain2.gain.setValueAtTime(0.2, now);
    gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
    osc2.connect(gain2);
    gain2.connect(ctx.destination);
    osc2.start(now);
    osc2.stop(now + 0.6);
  }

  if (type === 'tick') {
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(600 + Math.random() * 400, now);
    gain.gain.setValueAtTime(0.06, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 0.1);
  }

  if (type === 'reveal') {
    [523.25, 659.25, 783.99, 1046.5].forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + i * 0.08);
      gain.gain.setValueAtTime(0.12, now + i * 0.08);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 2.0 + i * 0.08);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + i * 0.08);
      osc.stop(now + 2.0 + i * 0.08);
    });

    var shimmer = ctx.createOscillator();
    var shimGain = ctx.createGain();
    shimmer.type = 'sine';
    shimmer.frequency.setValueAtTime(2000, now);
    shimmer.frequency.exponentialRampToValueAtTime(4000, now + 0.5);
    shimGain.gain.setValueAtTime(0.04, now);
    shimGain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    shimmer.connect(shimGain);
    shimGain.connect(ctx.destination);
    shimmer.start(now);
    shimmer.stop(now + 0.8);
  }

  if (type === 'whoosh') {
    var bufSize = ctx.sampleRate * 0.3;
    var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) { data[i] = (Math.random() * 2 - 1) * 0.5; }
    var src = ctx.createBufferSource();
    src.buffer = buf;
    var filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(1000, now);
    filter.frequency.exponentialRampToValueAtTime(3000, now + 0.15);
    filter.frequency.exponentialRampToValueAtTime(500, now + 0.3);
    filter.Q.value = 5;
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.1, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    src.connect(filter);
    filter.connect(g);
    g.connect(ctx.destination);
    src.start(now);
  }
}

// ===== BACKGROUND PARTICLES =====
(function() {
  var c = document.getElementById('bg-canvas');
  var ctx = c.getContext('2d');
  var pts = [];
  var count = 70;

  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < count; i++) {
    pts.push({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random() * 0.35 + 0.05,
      isPurple: Math.random() > 0.3
    });
  }

  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    for (var i = 0; i < pts.length; i++) {
      var p = pts[i];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > c.width) p.vx *= -1;
      if (p.y < 0 || p.y > c.height) p.vy *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.isPurple ? 'rgba(139,92,246,' + p.a + ')' : 'rgba(6,182,212,' + p.a + ')';
      ctx.fill();
      for (var j = i + 1; j < pts.length; j++) {
        var q = pts[j];
        var dx = p.x - q.x, dy = p.y - q.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          var lineAlpha = 0.1 * (1 - dist / 120);
          ctx.strokeStyle = 'rgba(139,92,246,' + lineAlpha + ')';
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ===== LIGHT RAYS =====
(function() {
  var raysEl = document.getElementById('light-rays');
  var rayCount = 12;
  for (var i = 0; i < rayCount; i++) {
    var ray = document.createElement('div');
    ray.className = 'light-ray';
    ray.style.transform = 'rotate(' + (i * (360 / rayCount)) + 'deg)';
    ray.style.opacity = 0.3 + Math.random() * 0.3;
    ray.style.height = (120 + Math.random() * 80) + 'px';
    raysEl.appendChild(ray);
  }
})();

// ===== 3D BOX ROTATION =====
var boxAngle = 0;
var boxSpeed = 0.4;
var boxScene = document.getElementById('box-scene');
var box3d = document.getElementById('box-3d');
var boxGlow = document.getElementById('box-glow');
var lightRays = document.getElementById('light-rays');
var openBtn = document.getElementById('open-btn');
var progressWrap = document.getElementById('progress-wrap');
var progressBar = document.getElementById('progress-bar');

function rotateBox() {
  if (!isAnimating) {
    boxAngle += boxSpeed;
    box3d.style.transform = 'rotateX(-15deg) rotateY(' + boxAngle + 'deg)';
  }
  requestAnimationFrame(rotateBox);
}
rotateBox();

// Show box on load
setTimeout(function() {
  boxScene.classList.add('visible');
  boxGlow.classList.add('active');
  lightRays.classList.add('active');
}, 300);

// ===== CONFETTI SYSTEM =====
var confettiCanvas = document.getElementById('confetti-canvas');
var confCtx = confettiCanvas.getContext('2d');
var confettiParts = [];

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeConfetti();
window.addEventListener('resize', resizeConfetti);

function spawnConfetti(count) {
  for (var i = 0; i < count; i++) {
    var isPurple = Math.random() > 0.35;
    var hue = isPurple ? (260 + Math.random() * 30) : (180 + Math.random() * 20);
    var lightness = 50 + Math.random() * 30;
    confettiParts.push({
      x: Math.random() * confettiCanvas.width,
      y: -20 - Math.random() * 100,
      vx: (Math.random() - 0.5) * 6,
      vy: Math.random() * 4 + 2,
      w: Math.random() * 8 + 4,
      h: Math.random() * 6 + 3,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 12,
      color: 'hsl(' + hue + ',90%,' + lightness + '%)',
      life: 1,
      decay: 0.003 + Math.random() * 0.005
    });
  }
}

function drawConfetti() {
  confCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  for (var i = confettiParts.length - 1; i >= 0; i--) {
    var p = confettiParts[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.vx *= 0.99;
    p.rot += p.rotV;
    p.life -= p.decay;
    if (p.life <= 0 || p.y > confettiCanvas.height + 50) {
      confettiParts.splice(i, 1);
      continue;
    }
    confCtx.save();
    confCtx.translate(p.x, p.y);
    confCtx.rotate(p.rot * Math.PI / 180);
    confCtx.globalAlpha = p.life;
    confCtx.fillStyle = p.color;
    confCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confCtx.restore();
  }
  requestAnimationFrame(drawConfetti);
}
drawConfetti();

// ===== OPENING ANIMATION =====
function startOpening() {
  if (isAnimating) return;
  isAnimating = true;

  getAudioCtx();

  openBtn.classList.add('hidden');
  progressWrap.classList.add('visible');

  playSound('open');

  // Phase 1: Accelerating spin (0-1.5s)
  var phase1Start = performance.now();
  var phase1Duration = 1500;

  function phase1(ts) {
    var elapsed = ts - phase1Start;
    var progress = Math.min(elapsed / phase1Duration, 1);
    var speed = 0.4 + progress * 8;
    boxAngle += speed;
    box3d.style.transform = 'rotateX(-15deg) rotateY(' + boxAngle + 'deg)';

    var glowScale = 1 + progress * 0.3;
    boxGlow.style.transform = 'translate(-50%,-50%) scale(' + glowScale + ')';
    boxGlow.style.opacity = 0.6 + progress * 0.4;

    if (Math.random() < progress * 0.3) playSound('tick');

    progressBar.style.width = (progress * 30) + '%';

    if (progress < 1) {
      requestAnimationFrame(phase1);
    } else {
      playSound('whoosh');
      phase2();
    }
  }
  requestAnimationFrame(phase1);

  function phase2() {
    var phase2Start = performance.now();
    var phase2Duration = 1500;
    var shakeIntensity = 8;

    function phase2Tick(ts) {
      var elapsed = ts - phase2Start;
      var progress = Math.min(elapsed / phase2Duration, 1);

      var speed = 8.4 * (1 - progress * 0.9);
      boxAngle += speed;

      var shake = shakeIntensity * (1 - progress);
      var sx = (Math.random() - 0.5) * shake;
      var sy = (Math.random() - 0.5) * shake * 0.5;

      box3d.style.transform = 'rotateX(-15deg) rotateY(' + boxAngle + 'deg) translate(' + sx + 'px,' + sy + 'px)';

      var scale = 1 + progress * 0.15;
      boxScene.style.transform = 'scale(' + scale + ')';

      if (Math.random() < (1 - progress) * 0.2) playSound('tick');

      progressBar.style.width = (30 + progress * 50) + '%';

      if (progress < 1) {
        requestAnimationFrame(phase2Tick);
      } else {
        phase3();
      }
    }
    requestAnimationFrame(phase2Tick);
  }

  function phase3() {
    var lid = document.getElementById('box-lid');
    var phase3Start = performance.now();
    var phase3Duration = 800;

    function phase3Tick(ts) {
      var elapsed = ts - phase3Start;
      var progress = Math.min(elapsed / phase3Duration, 1);

      var lidAngle = 90 + progress * 80;
      lid.style.transform = 'rotateX(' + lidAngle + 'deg) translateZ(130px)';

      boxGlow.style.background = 'radial-gradient(circle,rgba(139,92,246,' + (0.2 + progress * 0.3) + ') 0%,rgba(88,28,135,' + (0.08 + progress * 0.1) + ') 30%,transparent 70%)';

      progressBar.style.width = (80 + progress * 20) + '%';

      if (progress < 1) {
        requestAnimationFrame(phase3Tick);
      } else {
        flashAndReveal();
      }
    }
    requestAnimationFrame(phase3Tick);
  }

  function flashAndReveal() {
    var flash = document.getElementById('screen-flash');
    flash.classList.add('flash');
    playSound('reveal');
    spawnConfetti(80);

    setTimeout(function() { spawnConfetti(40); }, 300);
    setTimeout(function() { spawnConfetti(30); }, 600);

    setTimeout(function() {
      document.getElementById('case-container').style.display = 'none';
      var rewardScreen = document.getElementById('reward-screen');
      rewardScreen.classList.add('active');

      updateRewardDisplay();

      setTimeout(function() {
        document.getElementById('reward-card').classList.add('show');
      }, 100);

      isAnimating = false;
    }, 500);
  }
}

// ===== UPDATE REWARD FROM PAWN =====
function updateRewardDisplay() {
  document.getElementById('reward-name').textContent = rewardData.name;
  document.getElementById('reward-subtitle').textContent = rewardData.label;
  document.getElementById('reward-congrats').textContent = 'Cestitamo! Osvojili ste ' + rewardData.name;
  document.getElementById('stat-speed').textContent = rewardData.speed;
  document.getElementById('stat-accel').textContent = rewardData.accel;
  document.getElementById('stat-handling').textContent = rewardData.handling;

  var rarityEl = document.getElementById('reward-rarity');
  rarityEl.className = 'reward-rarity ' + rewardData.rarity;
  var rarityLabels = {legendary:'LEGENDARY',epic:'EPIC',rare:'RARE',common:'COMMON'};
  rarityEl.textContent = rarityLabels[rewardData.rarity] || 'RARE';

  // Update car glow color based on rarity
  var carGlow = document.getElementById('car-glow');
  var rarityColors = {
    legendary: 'radial-gradient(ellipse,rgba(255,170,0,0.3) 0%,rgba(255,100,0,0.08) 40%,transparent 70%)',
    epic: 'radial-gradient(ellipse,rgba(168,85,247,0.3) 0%,rgba(139,92,246,0.08) 40%,transparent 70%)',
    rare: 'radial-gradient(ellipse,rgba(139,92,246,0.25) 0%,rgba(88,28,135,0.06) 40%,transparent 70%)',
    common: 'radial-gradient(ellipse,rgba(100,200,100,0.18) 0%,rgba(100,200,100,0.05) 40%,transparent 70%)'
  };
  carGlow.style.background = rarityColors[rewardData.rarity] || rarityColors.rare;

  // Try to load vehicle image
  var carImg = document.getElementById('car-image');
  var imgSrc = vehicleImages[rewardData.name] || vehicleImages.default;
  carImg.src = imgSrc;

  // Show/hide image based on type
  if (rewardData.type === 'vehicle') {
    carImg.style.display = 'block';
  } else {
    carImg.style.display = 'none';
  }

  // Update glow ring colors based on rarity
  var ringColors = {
    legendary: { ring1: 'rgba(255,170,0,0.35)', ring2: 'rgba(255,170,0,0.2)', ring3: 'rgba(255,100,0,0.12)', ring4: 'rgba(255,170,0,0.06)' },
    epic: { ring1: 'rgba(168,85,247,0.35)', ring2: 'rgba(139,92,246,0.2)', ring3: 'rgba(109,40,217,0.12)', ring4: 'rgba(168,85,247,0.06)' },
    rare: { ring1: 'rgba(139,92,246,0.3)', ring2: 'rgba(139,92,246,0.18)', ring3: 'rgba(88,28,135,0.1)', ring4: 'rgba(139,92,246,0.05)' },
    common: { ring1: 'rgba(100,200,100,0.25)', ring2: 'rgba(100,200,100,0.15)', ring3: 'rgba(100,200,100,0.08)', ring4: 'rgba(100,200,100,0.04)' }
  };
  var colors = ringColors[rewardData.rarity] || ringColors.rare;
  var rings = document.querySelectorAll('.glow-ring');
  if (rings[0]) rings[0].style.borderColor = colors.ring1;
  if (rings[1]) rings[1].style.borderColor = colors.ring2;
  if (rings[2]) rings[2].style.borderColor = colors.ring3;
  if (rings[3]) rings[3].style.borderColor = colors.ring4;
}

// ===== CLOSE CASE =====
function closeCase() {
  if (typeof cef !== 'undefined' && cef.emit) {
    cef.emit('case:close');
  }
  resetCaseUI();
}

function resetCaseUI() {
  document.getElementById('reward-screen').classList.remove('active');
  document.getElementById('reward-card').classList.remove('show');
  document.getElementById('case-container').style.display = 'flex';
  openBtn.classList.remove('hidden');
  progressWrap.classList.remove('visible');
  progressBar.style.width = '0%';

  document.getElementById('box-lid').style.transform = 'rotateX(90deg) translateZ(130px)';
  boxScene.style.transform = 'scale(1)';
  boxGlow.style.background = 'radial-gradient(circle,rgba(139,92,246,0.2) 0%,rgba(88,28,135,0.08) 30%,transparent 70%)';
  boxGlow.style.transform = 'translate(-50%,-50%) scale(1)';
  boxGlow.style.opacity = '0.6';
  confettiParts = [];
  isAnimating = false;
}

// ===== ESC KEY =====
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' || e.keyCode === 27) {
    closeCase();
  }
});

// ===== CEF EVENTS FROM PAWN =====
if (typeof cef !== 'undefined' && cef.addEventListener) {
  cef.addEventListener('case:init', function(name, type, rarity, label, speed, accel, handling) {
    rewardData.name = name || 'Elegy';
    rewardData.type = type || 'vehicle';
    rewardData.rarity = rarity || 'legendary';
    rewardData.label = label || 'Sportsko vozilo';
    rewardData.speed = speed || '8.4';
    rewardData.accel = accel || '7.2';
    rewardData.handling = handling || '9.1';
    console.log('[CASE] init: ' + name + ' rarity=' + rarity);
  });
}
</script>
</body>
</html>
