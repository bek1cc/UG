<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG AI Dev Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#222233;
  --border:#2a2a3a;--border-light:#3a3a50;
  --text:#e0e0f0;--text2:#a0a0b8;--text3:#6a6a82;
  --accent:#10b981;--accent2:#059669;--accent-glow:rgba(16,185,129,0.15);
  --danger:#ef4444;--warning:#f59e0b;--info:#3b82f6;--purple:#8b5cf6;
  --mono:'Consolas','Monaco',monospace;--sans:'Segoe UI',Tahoma,sans-serif;
  --radius:10px;--radius-sm:6px;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;width:100vw;height:100vh;user-select:none}

/* LAYOUT */
.app{display:flex;height:100vh;width:100vw}
.sidebar{width:52px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:4px;flex-shrink:0}
.sidebar-btn{width:38px;height:38px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;position:relative}
.sidebar-btn:hover{background:var(--bg3);color:var(--text2)}
.sidebar-btn.active{background:var(--accent-glow);color:var(--accent)}
.sidebar-btn.active::before{content:'';position:absolute;left:0;top:25%;height:50%;width:2px;background:var(--accent);border-radius:1px}
.sidebar-spacer{flex:1}
.sidebar-status{width:8px;height:8px;border-radius:50%;background:var(--text3);margin-bottom:8px;transition:background .3s}
.sidebar-status.ok{background:var(--accent)}
.sidebar-status.error{background:var(--danger)}
.sidebar-status.generating{background:var(--warning);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{height:44px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.header-title{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);letter-spacing:1px}
.header-status{margin-left:auto;font-size:11px;color:var(--text3);font-family:var(--mono);display:flex;align-items:center;gap:6px}
.header-status .dot{display:inline-block;width:6px;height:6px;border-radius:50%}
.header-close{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.header-close:hover{background:rgba(239,68,68,.15);color:var(--danger)}

.content{flex:1;display:flex;min-height:0;position:relative}
.panel{display:none;flex:1;flex-direction:column;min-height:0}
.panel.active{display:flex}

/* CHAT */
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:6px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.msg{max-width:90%;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-user{align-self:flex-end}
.msg-ai{align-self:flex-start}
.msg-system{align-self:center}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap}
.msg-user .msg-bubble{background:var(--accent2);color:#fff;border-bottom-right-radius:4px}
.msg-ai .msg-bubble{background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-system .msg-bubble{background:var(--bg4);color:var(--text2);font-size:11px;padding:6px 12px;border-radius:20px}
.msg-bubble code{font-family:var(--mono);font-size:12px;background:rgba(0,0,0,.3);padding:1px 4px;border-radius:3px}
.msg-bubble pre{background:rgba(0,0,0,.3);padding:8px;border-radius:6px;overflow-x:auto;margin:6px 0;font-family:var(--mono);font-size:11px;line-height:1.5}
.msg-meta{font-size:10px;color:var(--text3);margin-top:2px;padding:0 4px}
.msg-user .msg-meta{text-align:right}

.typing{display:flex;gap:4px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;border-bottom-left-radius:4px;align-self:flex-start}
.typing span{width:6px;height:6px;background:var(--text3);border-radius:50%;animation:tbounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes tbounce{from{opacity:.3;transform:translateY(0)}to{opacity:1;transform:translateY(-4px)}}

.chat-input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;flex-shrink:0}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;resize:none;max-height:80px;min-height:40px;transition:border-color .2s}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--text3)}
.send-btn{padding:0 16px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.send-btn:hover{background:var(--accent2);transform:translateY(-1px)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* FILES */
.files-panel{flex:1;display:flex;flex-direction:column}
.files-toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center}
.files-search{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;color:var(--text);font-size:12px;outline:none}
.files-search:focus{border-color:var(--accent)}
.files-search::placeholder{color:var(--text3)}
.files-breadcrumb{font-family:var(--mono);font-size:11px;color:var(--text3);padding:6px 16px;border-bottom:1px solid rgba(255,255,255,.03)}
.files-breadcrumb span{cursor:pointer;color:var(--accent)}
.files-breadcrumb span:hover{text-decoration:underline}

.files-list{flex:1;overflow-y:auto;padding:4px}
.files-list::-webkit-scrollbar{width:6px}
.files-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.file-item{padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;color:var(--text2);transition:all .15s}
.file-item:hover{background:var(--bg3);color:var(--text)}
.file-item .fi-icon{font-size:14px;width:18px;text-align:center}
.file-item .fi-icon.dir{color:var(--warning)}
.file-item .fi-icon.pwn{color:var(--accent)}
.file-item .fi-icon.html{color:var(--danger)}
.file-item .fi-icon.css{color:var(--info)}
.file-item .fi-icon.js{color:#eab308}
.file-item .fi-name{flex:1;font-family:var(--mono);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item .fi-size{font-size:10px;color:var(--text3);font-family:var(--mono)}

.file-viewer{flex:1;display:none;flex-direction:column;border-top:1px solid var(--border)}
.file-viewer.active{display:flex}
.fv-header{padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--bg2)}
.fv-header .fv-name{font-family:var(--mono);font-size:12px;color:var(--accent);flex:1}
.fv-header .fv-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;transition:all .2s}
.fv-header .fv-btn:hover{background:var(--bg3)}
.fv-header .fv-btn.save{border-color:var(--accent);color:var(--accent)}
.fv-header .fv-btn.save:hover{background:var(--accent);color:#fff}
.fv-content{flex:1;overflow:auto;padding:12px;font-family:var(--mono);font-size:11px;line-height:1.6;white-space:pre-wrap;color:var(--text2);background:var(--bg)}
.fv-content::-webkit-scrollbar{width:6px}
.fv-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.fv-content[contenteditable=true]{outline:none;caret-color:var(--accent)}

/* LOGS */
.logs-panel{flex:1;display:flex;flex-direction:column}
.logs-toolbar{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.logs-toolbar span{font-size:12px;color:var(--text3)}
.logs-list{flex:1;overflow-y:auto;padding:8px;font-family:var(--mono);font-size:11px}
.logs-list::-webkit-scrollbar{width:6px}
.logs-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.log-entry{padding:4px 8px;border-bottom:1px solid rgba(255,255,255,.03);display:flex;gap:8px}
.log-time{color:var(--text3);white-space:nowrap;flex-shrink:0}
.log-action{padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;flex-shrink:0}
.log-action.chat{background:rgba(139,92,246,.08);color:var(--purple)}
.log-action.write{background:rgba(16,185,129,.1);color:var(--accent)}
.log-action.backup{background:rgba(59,130,246,.1);color:var(--info)}
.log-details{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

/* SETTINGS */
.settings-panel{flex:1;overflow-y:auto;padding:20px}
.settings-panel::-webkit-scrollbar{width:6px}
.settings-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.settings-group{margin-bottom:20px}
.settings-group h3{font-size:13px;color:var(--accent);margin-bottom:8px;font-family:var(--mono)}
.setting-row{display:flex;align-items:center;gap:12px;padding:6px 0}
.setting-row label{font-size:12px;color:var(--text2);width:140px;flex-shrink:0}
.setting-row .val{font-family:var(--mono);font-size:12px;color:var(--text);flex:1}

/* Welcome */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px}
.welcome h2{font-size:20px;color:var(--accent);font-family:var(--mono)}
.welcome p{font-size:13px;color:var(--text2);text-align:center;max-width:400px;line-height:1.6}
.welcome .qcmds{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.qcmd{padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s;font-family:var(--mono)}
.qcmd:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <button class="sidebar-btn active" data-panel="chat" title="Chat">💬</button>
    <button class="sidebar-btn" data-panel="files" title="Files">📁</button>
    <button class="sidebar-btn" data-panel="logs" title="Logs">📋</button>
    <button class="sidebar-btn" data-panel="settings" title="Settings">⚙️</button>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-status error" id="connectionStatus" title="Disconnected"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <!-- Header -->
    <div class="header">
      <span class="header-title">UG AI DEV</span>
      <span class="header-status" id="headerStatus"><span class="dot" style="background:var(--text3)"></span><span id="statusText">Connecting...</span></span>
      <button class="header-close" id="closeBtn" title="Close">✕</button>
    </div>

    <div class="content">
      <!-- Chat Panel -->
      <div class="panel active" id="panel-chat">
        <div class="chat-messages" id="chatMessages">
          <div class="welcome" id="welcome">
            <h2>UG AI Dev Panel</h2>
            <p>Pitaj me bilo sto o SA:MP/open.mp Pawn skriptiranju, CEF developmentu, ili bilo kom sistemu u gamemodeu.</p>
            <div class="qcmds">
              <button class="qcmd" data-msg="Napravi mi novu komandu u Pawnu">Nova komanda</button>
              <button class="qcmd" data-msg="Prikazi mi kako napraviti CEF panel">CEF panel</button>
              <button class="qcmd" data-msg="Kako napraviti novi sistem u gamemodeu?">Novi sistem</button>
              <button class="qcmd" data-msg="Objasni mi kako radi streamer">Streamer</button>
            </div>
          </div>
        </div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chatInput" placeholder="Pitaj AI..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn">SEND</button>
        </div>
      </div>

      <!-- Files Panel -->
      <div class="panel" id="panel-files">
        <div class="files-panel" id="filesPanel">
          <div class="files-toolbar">
            <input class="files-search" id="filesSearch" placeholder="Pretrazi fajlove...">
            <button class="fv-btn" id="filesRefresh" style="padding:6px 12px">Refresh</button>
          </div>
          <div class="files-breadcrumb" id="filesBreadcrumb">📂 <span data-path="">root</span></div>
          <div class="files-list" id="filesList"></div>
        </div>
        <div class="file-viewer" id="fileViewer">
          <div class="fv-header">
            <span class="fv-name" id="fvName">-</span>
            <button class="fv-btn" id="fvBack">← Back</button>
            <button class="fv-btn save" id="fvSave">💾 Save</button>
          </div>
          <div class="fv-content" id="fvContent"></div>
        </div>
      </div>

      <!-- Logs Panel -->
      <div class="panel" id="panel-logs">
        <div class="logs-panel">
          <div class="logs-toolbar">
            <span>Operation Log</span>
            <button class="fv-btn" id="logsRefresh" style="margin-left:auto;padding:4px 10px">Refresh</button>
          </div>
          <div class="logs-list" id="logsList"></div>
        </div>
      </div>

      <!-- Settings Panel -->
      <div class="panel" id="panel-settings">
        <div class="settings-panel" id="settingsPanel">
          <div class="settings-group">
            <h3>Connection</h3>
            <div class="setting-row"><label>Backend URL</label><div class="val" id="settBackend">-</div></div>
            <div class="setting-row"><label>SDK Status</label><div class="val" id="settSdk">-</div></div>
            <div class="setting-row"><label>Uptime</label><div class="val" id="settUptime">-</div></div>
          </div>
          <div class="settings-group">
            <h3>Project</h3>
            <div class="setting-row"><label>Root</label><div class="val" id="settRoot">-</div></div>
            <div class="setting-row"><label>Sessions</label><div class="val" id="settSessions">-</div></div>
          </div>
          <div class="settings-group">
            <h3>Actions</h3>
            <div class="setting-row"><label>Clear Chat</label><button class="fv-btn" id="clearChatBtn" style="padding:4px 12px">Clear</button></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
var BACKEND = '';
if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
  BACKEND = window.location.origin;
} else {
  BACKEND = 'http://127.0.0.1:3777';
}
var ADMIN_KEY = 'ug-admin-2024';
var PLAYER_ID = 0;
var currentPanel = 'chat';
var isGenerating = false;
var messageHistory = [];
var generateTimeout = null;
var currentDir = '';
var currentFilePath = null;
var currentFileContent = '';
var fileContentDirty = false;

// ===== CEF EVENTS =====
var domReady = false;
if (typeof cef !== 'undefined') {
  cef.addEventListener('aidev:init', function(playerid, key) {
    PLAYER_ID = playerid || 0;
    if (key) ADMIN_KEY = key;
    if (domReady) checkBackend();
  });
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
  domReady = true;
  if (typeof cef === 'undefined') PLAYER_ID = 1;
  initSidebar();
  initChat();
  initFiles();
  initLogs();
  initSettings();
  checkBackend();
});

// ===== SIDEBAR =====
function initSidebar() {
  document.querySelectorAll('.sidebar-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var panel = this.dataset.panel;
      if (!panel) return;
      switchPanel(panel);
    });
  });
}

function switchPanel(name) {
  currentPanel = name;
  document.querySelectorAll('.sidebar-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  var btn = document.querySelector('.sidebar-btn[data-panel="' + name + '"]');
  var panel = document.getElementById('panel-' + name);
  if (btn) btn.classList.add('active');
  if (panel) panel.classList.add('active');
  if (name === 'files') loadFiles();
  if (name === 'logs') loadLogs();
  if (name === 'settings') refreshSettings();
}

// ===== BACKEND CHECK =====
async function checkBackend() {
  try {
    var resp = await fetch(BACKEND + '/api/health');
    var data = await resp.json();
    document.getElementById('connectionStatus').className = 'sidebar-status ok';
    document.getElementById('connectionStatus').title = 'Connected';
    document.getElementById('headerStatus').innerHTML = '<span class="dot" style="background:var(--accent)"></span><span id="statusText">Connected</span>';
    console.log('[AI-DEV] Backend connected, SDK:', data.sdkAvailable);
  } catch (e) {
    document.getElementById('connectionStatus').className = 'sidebar-status error';
    document.getElementById('connectionStatus').title = 'Backend offline';
    document.getElementById('headerStatus').innerHTML = '<span class="dot" style="background:var(--danger)"></span><span>Offline</span>';
    addSystemMsg('Backend nije dostupan na ' + BACKEND);
  }
}

// ===== CHAT =====
function initChat() {
  var input = document.getElementById('chatInput');
  var sendBtn = document.getElementById('sendBtn');
  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 80) + 'px';
  });
  document.querySelectorAll('.qcmd').forEach(function(btn) {
    btn.addEventListener('click', function() {
      input.value = this.dataset.msg;
      sendMessage();
    });
  });
  document.getElementById('closeBtn').addEventListener('click', function() {
    if (typeof cef !== 'undefined') cef.emit('aidev:close');
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && typeof cef !== 'undefined') cef.emit('aidev:close');
  });
}

async function sendMessage() {
  var input = document.getElementById('chatInput');
  var msg = input.value.trim();
  if (!msg || isGenerating) return;
  input.value = '';
  input.style.height = 'auto';
  setGenerating(true);

  if (generateTimeout) clearTimeout(generateTimeout);
  generateTimeout = setTimeout(function() {
    if (isGenerating) { isGenerating = false; setGenerating(false); addSystemMsg('Timeout: AI nije odgovorio. Pokusaj ponovo.'); }
  }, 60000);

  var welcome = document.getElementById('welcome');
  if (welcome) welcome.style.display = 'none';
  addUserMsg(msg);

  try {
    var controller = new AbortController();
    var fetchTimeout = setTimeout(function() { controller.abort(); }, 60000);
    var resp = await fetch(BACKEND + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
      body: JSON.stringify({ message: msg, playerid: PLAYER_ID, history: messageHistory }),
      signal: controller.signal,
    });
    clearTimeout(fetchTimeout);
    var data = await resp.json();

    if (data.error) { addSystemMsg('Error: ' + data.error); if (generateTimeout) clearTimeout(generateTimeout); setGenerating(false); return; }

    addAIMsg(data.response);
    messageHistory.push({ role: 'user', content: msg });
    messageHistory.push({ role: 'assistant', content: data.response });
  } catch (e) {
    var errMsg = e.name === 'AbortError' ? 'Request timeout (60s).' : 'Backend error: ' + e.message;
    addSystemMsg(errMsg);
  }
  if (generateTimeout) clearTimeout(generateTimeout);
  setGenerating(false);
}

function addUserMsg(text) {
  var c = document.getElementById('chatMessages');
  var d = document.createElement('div');
  d.className = 'msg msg-user';
  d.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '</div><div class="msg-meta">' + timeNow() + '</div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function addAIMsg(text) {
  var c = document.getElementById('chatMessages');
  var d = document.createElement('div');
  d.className = 'msg msg-ai';
  d.innerHTML = '<div class="msg-bubble">' + formatMsg(text) + '</div><div class="msg-meta">AI · ' + timeNow() + '</div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function addSystemMsg(text) {
  var c = document.getElementById('chatMessages');
  var d = document.createElement('div');
  d.className = 'msg msg-system';
  d.innerHTML = '<div class="msg-bubble">' + escapeHtml(text) + '</div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function setGenerating(val) {
  isGenerating = val;
  var btn = document.getElementById('sendBtn');
  var input = document.getElementById('chatInput');
  btn.disabled = val;
  if (val) {
    btn.textContent = '...';
    input.disabled = true;
    // Show typing indicator
    var existing = document.getElementById('typingIndicator');
    if (!existing) {
      var t = document.createElement('div');
      t.className = 'typing';
      t.id = 'typingIndicator';
      t.innerHTML = '<span></span><span></span><span></span>';
      document.getElementById('chatMessages').appendChild(t);
      document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    }
  } else {
    btn.textContent = 'SEND';
    input.disabled = false;
    input.focus();
    var t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }
}

function formatMsg(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    return '<pre><code>' + escapeHtml(code.trim()) + '</code></pre>';
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  return text;
}

// ===== FILES =====
function initFiles() {
  document.getElementById('filesRefresh').addEventListener('click', function() { loadFiles(currentDir); });
  document.getElementById('filesSearch').addEventListener('input', function() { filterFiles(this.value); });
  document.getElementById('fvBack').addEventListener('click', closeFileViewer);
  document.getElementById('fvSave').addEventListener('click', saveCurrentFile);
}

async function loadFiles(dir) {
  if (dir === undefined) dir = currentDir;
  currentDir = dir;
  closeFileViewer();
  try {
    var resp = await fetch(BACKEND + '/api/files?dir=' + encodeURIComponent(dir) + '&key=' + ADMIN_KEY);
    var data = await resp.json();
    if (data.error) { console.error('Files error:', data.error); return; }
    renderBreadcrumb(data.path);
    renderFiles(data.items);
  } catch (e) {
    console.error('Files load error:', e);
  }
}

function renderBreadcrumb(dirPath) {
  var el = document.getElementById('filesBreadcrumb');
  var parts = dirPath ? dirPath.split('/') : [];
  var html = '📂 <span data-path="">root</span>';
  var accum = '';
  for (var i = 0; i < parts.length; i++) {
    accum += (i > 0 ? '/' : '') + parts[i];
    html += ' / <span data-path="' + accum + '">' + parts[i] + '</span>';
  }
  el.innerHTML = html;
  el.querySelectorAll('span').forEach(function(s) {
    s.addEventListener('click', function() { loadFiles(this.dataset.path); });
  });
}

function renderFiles(items) {
  var el = document.getElementById('filesList');
  if (!items || items.length === 0) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3)">Empty directory</div>'; return; }
  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var icon = '📄';
    var iconClass = '';
    if (item.type === 'dir') { icon = '📁'; iconClass = 'dir'; }
    else if (item.ext === '.pwn' || item.ext === '.inc') { icon = '⚡'; iconClass = 'pwn'; }
    else if (item.ext === '.html') { icon = '🌐'; iconClass = 'html'; }
    else if (item.ext === '.css') { icon = '🎨'; iconClass = 'css'; }
    else if (item.ext === '.js') { icon = '📜'; iconClass = 'js'; }
    var size = item.size ? (item.size < 1024 ? item.size + 'b' : (item.size / 1024).toFixed(1) + 'k') : '';
    html += '<div class="file-item" data-path="' + item.path + '" data-type="' + item.type + '">'
      + '<span class="fi-icon ' + iconClass + '">' + icon + '</span>'
      + '<span class="fi-name">' + item.name + '</span>'
      + '<span class="fi-size">' + size + '</span>'
      + '</div>';
  }
  el.innerHTML = html;
  el.querySelectorAll('.file-item').forEach(function(fi) {
    fi.addEventListener('click', function() {
      if (this.dataset.type === 'dir') { loadFiles(this.dataset.path); }
      else { openFile(this.dataset.path); }
    });
  });
}

function filterFiles(query) {
  var q = query.toLowerCase();
  document.querySelectorAll('.file-item').forEach(function(fi) {
    var name = fi.querySelector('.fi-name').textContent.toLowerCase();
    fi.style.display = name.indexOf(q) >= 0 ? '' : 'none';
  });
}

async function openFile(filePath) {
  try {
    var resp = await fetch(BACKEND + '/api/files/' + encodeURIComponent(filePath) + '?key=' + ADMIN_KEY);
    var data = await resp.json();
    if (data.error) { console.error('File error:', data.error); return; }
    currentFilePath = data.path;
    currentFileContent = data.content;
    fileContentDirty = false;
    document.getElementById('fvName').textContent = data.path;
    document.getElementById('fvContent').textContent = data.content;
    document.getElementById('fvContent').contentEditable = true;
    document.getElementById('filesPanel').style.display = 'none';
    document.getElementById('fileViewer').classList.add('active');

    document.getElementById('fvContent').addEventListener('input', function() {
      fileContentDirty = true;
    });
  } catch (e) { console.error('Open file error:', e); }
}

function closeFileViewer() {
  if (fileContentDirty) {
    if (!confirm('Imas nesacuvane izmjene. Zatvoriti?')) return;
  }
  document.getElementById('filesPanel').style.display = '';
  document.getElementById('fileViewer').classList.remove('active');
  currentFilePath = null;
  currentFileContent = '';
  fileContentDirty = false;
}

async function saveCurrentFile() {
  if (!currentFilePath) return;
  var newContent = document.getElementById('fvContent').textContent;
  try {
    var resp = await fetch(BACKEND + '/api/files/' + encodeURIComponent(currentFilePath) + '?key=' + ADMIN_KEY, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
      body: JSON.stringify({ content: newContent }),
    });
    var data = await resp.json();
    if (data.success) {
      currentFileContent = newContent;
      fileContentDirty = false;
      document.getElementById('fvSave').textContent = '✓ Saved';
      setTimeout(function() { document.getElementById('fvSave').textContent = '💾 Save'; }, 1500);
    } else {
      alert('Error: ' + (data.error || 'Unknown'));
    }
  } catch (e) { alert('Save error: ' + e.message); }
}

// ===== LOGS =====
function initLogs() {
  document.getElementById('logsRefresh').addEventListener('click', loadLogs);
}

async function loadLogs() {
  try {
    var resp = await fetch(BACKEND + '/api/logs?limit=100&key=' + ADMIN_KEY);
    var data = await resp.json();
    renderLogs(data.logs || []);
  } catch (e) { console.error('Logs error:', e); }
}

function renderLogs(logs) {
  var el = document.getElementById('logsList');
  if (!logs || logs.length === 0) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3)">No logs yet</div>'; return; }
  var html = '';
  for (var i = logs.length - 1; i >= 0; i--) {
    var l = logs[i];
    var time = l.time ? l.time.replace('T', ' ').substring(0, 19) : '-';
    var details = typeof l.details === 'string' ? l.details : JSON.stringify(l.details || '');
    if (details.length > 80) details = details.substring(0, 80) + '...';
    html += '<div class="log-entry">'
      + '<span class="log-time">' + time + '</span>'
      + '<span class="log-action ' + l.action + '">' + l.action + '</span>'
      + '<span class="log-details">' + escapeHtml(details) + '</span>'
      + '</div>';
  }
  el.innerHTML = html;
}

// ===== SETTINGS =====
function initSettings() {
  document.getElementById('clearChatBtn').addEventListener('click', function() {
    messageHistory = [];
    document.getElementById('chatMessages').innerHTML = '';
    var w = document.getElementById('welcome');
    if (w) w.style.display = '';
  });
}

async function refreshSettings() {
  try {
    var resp = await fetch(BACKEND + '/api/health');
    var data = await resp.json();
    document.getElementById('settBackend').textContent = BACKEND;
    document.getElementById('settSdk').textContent = data.sdkAvailable ? '✓ Active' : '✗ Not available';
    document.getElementById('settSdk').style.color = data.sdkAvailable ? 'var(--accent)' : 'var(--danger)';
    document.getElementById('settUptime').textContent = data.uptime ? Math.floor(data.uptime / 60) + ' min' : '-';
    document.getElementById('settRoot').textContent = data.projectRoot || '-';
    document.getElementById('settSessions').textContent = data.sessions || '0';
  } catch (e) {
    document.getElementById('settBackend').textContent = BACKEND + ' (offline)';
  }
}

// ===== UTILS =====
function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function timeNow() {
  var d = new Date();
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}
